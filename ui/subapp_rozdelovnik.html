<script>
(function () {
  const RZ_TABS = [
    { key: 'artikly', label: 'Artikly' },
    { key: 'rozdeleni', label: 'Rozdělení' },
    { key: 'odprodej', label: 'Odprodej' },
    { key: 'teo_stavy', label: 'Teo. stavy' },
    { key: 'vyskladnovaci_listy', label: 'Vyskladňovací listy' },
    { key: 'prideleni_po_artiklech', label: 'Přidělení po artiklech' },
  ];
  const RZ_IMPORT_TABS = ['odprodej', 'teo_stavy', 'vyskladnovaci_listy', 'prideleni_po_artiklech'];
  const RZ_ARTIKLY_ROWS = 20;
  const RZ_ROW_H = 25; // odpovídá výšce řádku v rz-compact (input 22px + padding + sdílený border)

  const RZ = {
    container: null,
    app: null,
    user: null,
    activeTab: 'artikly',
    artikly: [],
    skupiny: [],
    stores: [],
    settings: {},
    importData: {},
    importOverview: null,
    syncFiles: null,
    rozdeleni: null,
    _artiklyDirty: false,
    _artiklySaveReqId: 0,
    _rozdeleniReqId: 0,
    _queue: [],
    _queueBusy: false,
    _sfState: {},
    _sfViewCache: {},
    _colWidths: {},
    _sfMenu: null,
    _colMenuOutside: null,

    init(container, app, user) {
      this.container = container;
      this.app = app;
      this.user = user;
      // Odložené zápisy (viz _enqueueDebounced) odeslat, než se stránka zavře -
      // jinak by se poslední úprava do ~0,7 s před zavřením ztratila.
      window.addEventListener('beforeunload', () => this.flushPendingWrites());
      this.render();
      this.loadAll();
    },

    get canWrite() {
      return this.user.role === 'SUPERADMIN' || this.user.permission === 'EDITOR';
    },

    loadAll() {
      Ui.call('apiRzGetSettings', null, { silent: true })
        .then((s) => { this.settings = s || {}; })
        .catch((e) => Ui.toast(e.message, 'error'));
      Ui.call('apiRzListArtikly', null, { silent: true })
        .then((rows) => {
          // Tento počáteční GET běží souběžně se 7 dalšími voláními při startu appky
          // a může dorazit až PO tom, co uživatel stihl něco vyplnit a uložit (saveArtikly
          // je rychlejší, protože nesoutěží tak o frontu). Kdyby se aplikovala, přepsala
          // by čerstvě uložená data starým stavem - proto se po prvním uložení ignoruje.
          if (this._artiklyDirty) return;
          this.artikly = rows;
          if (this.activeTab === 'artikly' || this.activeTab === 'rozdeleni') this.renderTabContent();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
      Ui.call('apiRzListStores', null, { silent: true })
        .then((rows) => { this.stores = rows; if (this.activeTab === 'artikly' || this.activeTab === 'rozdeleni') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
      this.loadSkupiny();
      this.loadImportOverview();
      this.loadSyncFiles();
      this.loadRozdeleni();
      // Data importovaných souborů se natáhnou rovnou po startu, ne až po
      // kliknutí na záložku - u větších souborů by pak čekání bylo znát.
      RZ_IMPORT_TABS.forEach((key) => this.loadImportTable(key));
    },

    /**
     * Volá se jak při startu appky, tak po každém uložení Úpravy/min/max -
     * dvě takové volání mohou dorazit v jiném pořadí, než byla vyslána (např.
     * počáteční GET dorazí až po pozdějším save-refresh). Číslo požadavku
     * zaručí, že se aplikuje vždy jen výsledek TOHO NEJNOVĚJI vyslaného volání.
     */
    loadRozdeleni() {
      const reqId = ++this._rozdeleniReqId;
      return Ui.call('apiRzGetRozdeleni', null, { silent: true })
        .then((rows) => {
          if (reqId !== this._rozdeleniReqId) return;
          this.rozdeleni = rows;
          if (this.activeTab === 'rozdeleni') this.renderTabContent();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    loadSkupiny() {
      return Ui.call('apiRzListSkupiny', null, { silent: true })
        .then((rows) => { this.skupiny = rows || []; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /**
     * Zápisové požadavky (uložení Artiklů, Rozdělení) jdou přes tuhle frontu
     * místo přímého google.script.run. Dva důvody:
     *
     * 1) Souběžné zápisy na serveru soutěží o stejný zámek tabulky
     *    (LockService) a při delší frontě čekání překročí časový limit.
     * 2) Každé volání google.script.run má pevnou režii ~1-3 s (nová
     *    exekuce, auth, odpověď) - u autosave z každého políčka se to
     *    sečte do desítek sekund. Proto se úlohy se stejným klíčem
     *    SLUČUJÍ: čeká-li už zápis pro stejný klíč, jen se přepíše
     *    novějšími daty místo přidání dalšího volání. Payload je vždy
     *    kompletní stav (ne přírůstek), takže starší čekající zápis je
     *    beztak zbytečný.
     */
    _enqueue(label, taskFn, key) {
      return new Promise((resolve, reject) => {
        if (key) {
          const pending = this._queue.find((j) => j.key === key);
          if (pending) {
            // Novější data nahradí ta čekající - staré volání se vůbec neodešle.
            pending.taskFn = taskFn;
            pending.label = label;
            pending.followers.push({ resolve: resolve, reject: reject });
            this._updateQueueIndicator();
            return;
          }
        }
        this._queue.push({ key: key || null, label: label, taskFn: taskFn, resolve: resolve, reject: reject, followers: [] });
        this._updateQueueIndicator();
        this._drainQueue();
      });
    },

    /** Zápis s odkladem - spustí se, až uživatel chvíli nepíše. Víc změn za sebou tak skončí jako jedno volání místo jednoho na každé opuštění políčka. */
    _enqueueDebounced(label, taskFn, key, delayMs) {
      if (!this._debounced) this._debounced = {};
      const existing = this._debounced[key];
      if (existing) clearTimeout(existing.timer);
      const entry = { label: label, taskFn: taskFn };
      entry.timer = setTimeout(() => {
        delete this._debounced[key];
        this._updateQueueIndicator();
        this._enqueue(entry.label, entry.taskFn, key).catch((e) => Ui.toast(e.message, 'error'));
      }, delayMs || 700);
      this._debounced[key] = entry;
      this._updateQueueIndicator();
    },

    /** Okamžitě odešle vše, co čeká na odklad (odchod ze stránky, přepnutí záložky), ať se poslední úprava neztratí. */
    flushPendingWrites() {
      if (!this._debounced) return;
      const keys = Object.keys(this._debounced);
      keys.forEach((key) => {
        const entry = this._debounced[key];
        clearTimeout(entry.timer);
        delete this._debounced[key];
        this._enqueue(entry.label, entry.taskFn, key).catch((e) => Ui.toast(e.message, 'error'));
      });
      this._updateQueueIndicator();
    },

    _drainQueue() {
      if (this._queueBusy || !this._queue.length) return;
      this._queueBusy = true;
      const job = this._queue.shift();
      this._updateQueueIndicator();
      Promise.resolve()
        .then(job.taskFn)
        .then((result) => {
          job.resolve(result);
          job.followers.forEach((f) => f.resolve(result));
        })
        .catch((err) => {
          job.reject(err);
          job.followers.forEach((f) => f.reject(err));
        })
        .then(() => {
          this._queueBusy = false;
          this._updateQueueIndicator();
          this._drainQueue();
        });
    },

    _updateQueueIndicator() {
      const el = document.querySelector('#rzQueueIndicator');
      if (!el) return;
      const waiting = this._queue.length + Object.keys(this._debounced || {}).length;
      const total = waiting + (this._queueBusy ? 1 : 0);
      if (!total) {
        el.classList.add('is-hidden');
        el.textContent = '';
        return;
      }
      el.classList.remove('is-hidden');
      el.textContent = 'Ukládám…' + (waiting ? ' (' + waiting + ' čeká)' : '');
    },

    loadImportOverview() {
      return Ui.call('apiRzGetImportOverview', null, { silent: true })
        .then((overview) => { this.importOverview = overview; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /** Surový seznam souborů ve složce se zdrojovými soubory (viz apiRzListSyncFolderFiles) - pro smazání starých/nahrání nových, nezávisle na tom, jestli soubor zrovna sedí na některý ze 4 vzorů. */
    loadSyncFiles() {
      return Ui.call('apiRzListSyncFolderFiles', null, { silent: true })
        .then((res) => { this.syncFiles = res || { folderName: '', files: [] }; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    render() {
      this.container.style.padding = '0';

      const settingsBtnWrap = document.querySelector('.subapp-topbar-right');
      if (settingsBtnWrap && !settingsBtnWrap.querySelector('#rzSettingsBtn')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin',
          '<button class="button button-secondary button-small" type="button" id="rzSettingsBtn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-settings"></use></svg>Nastavení</button>');
        document.querySelector('#rzSettingsBtn').addEventListener('click', () => this.openSettings());
      }
      // Export je akce nad rozdělením - tlačítko proto viditelné jen v záložce
      // Rozdělení (přepíná se v showTab), ne trvale ve sdílené horní liště.
      if (settingsBtnWrap && this.canWrite && !settingsBtnWrap.querySelector('#rzExportWbBtn')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin',
          '<button class="button button-secondary button-small is-hidden" type="button" id="rzExportWbBtn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-file-text"></use></svg>Exportovat</button>');
        document.querySelector('#rzExportWbBtn').addEventListener('click', () => this.exportWb());
      }
      // Stejně jako Exportovat - jen v záložce Rozdělení, přepíná se v showTab.
      if (settingsBtnWrap && this.canWrite && !settingsBtnWrap.querySelector('#rzRecalcAllBtn')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin',
          '<button class="button button-secondary button-small is-hidden" type="button" id="rzRecalcAllBtn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-refresh"></use></svg>Přepočítat vše</button>');
        document.querySelector('#rzRecalcAllBtn').addEventListener('click', () => this.recomputeAllRw());
      }
      if (settingsBtnWrap && !settingsBtnWrap.querySelector('#rzQueueIndicator')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin', '<span class="rz-queue-indicator is-hidden" id="rzQueueIndicator"></span>');
      }

      this.container.innerHTML =
        '<div class="section-body" id="rzTabContent"></div>' +
        '<nav class="rz-tabbar">' +
        RZ_TABS.map((t) => '<button class="rz-tabbtn' + (t.key === this.activeTab ? ' is-active' : '') +
          '" type="button" data-tab="' + t.key + '">' + Ui.escape(t.label) + '</button>').join('') +
        '</nav>' +
        '<dialog class="modal modal-large" id="rzSettingsModal">' +
        '  <form id="rzSettingsForm">' +
        '    <header class="modal-header">' +
        '      <span class="modal-icon"><svg><use href="#i-settings"></use></svg></span>' +
        '      <div class="modal-header-text"><p class="kicker">Rozdělovník 20 artiklů</p><h2>Nastavení</h2></div>' +
        '      <button class="modal-close" type="button" id="rzCloseSettingsBtn" aria-label="Zavřít"><svg><use href="#i-close"></use></svg></button>' +
        '    </header>' +
        '    <div class="modal-body">' +
        '      <div class="rz-modal-tabs">' +
        '        <button class="rz-modal-tabbtn is-active" type="button" data-settings-tab="soubory">Zdrojové soubory</button>' +
        '        <button class="rz-modal-tabbtn" type="button" data-settings-tab="informace">Informace o artiklech</button>' +
        '        <button class="rz-modal-tabbtn" type="button" data-settings-tab="export">Export</button>' +
        '        <button class="rz-modal-tabbtn" type="button" data-settings-tab="zobrazeni">Zobrazení</button>' +
        '      </div>' +
        '      <div class="rz-settings-panel" data-settings-panel="soubory">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka se zdrojovými soubory (URL nebo ID)</span><input name="syncFolderUrl" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <label><span>Soubor Odprodej — výraz v názvu</span><input name="patternOdprodej" type="text" placeholder="např. odprodej"></label>' +
        '          <label><span>Soubor Teoretické stavy — výraz v názvu</span><input name="patternTeoStavy" type="text" placeholder="např. teo_stavy"></label>' +
        '          <label><span>Soubor Vyskladňovací listy — výraz v názvu</span><input name="patternVyskladnovaciListy" type="text" placeholder="např. vyskladnovaci"></label>' +
        '          <label><span>Soubor Přidělení po artiklech — výraz v názvu</span><input name="patternPrideleniPoArtiklech" type="text" placeholder="např. prideleni"></label>' +
        '          <p class="form-hint">Přehled nalezených souborů je na záložce Artikly.</p>' +
        '        </div>' +
        '      </div>' +
        '      <div class="rz-settings-panel is-hidden" data-settings-panel="informace">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka s informacemi o artiklech (URL nebo ID)</span><input name="folderInformaceOArtiklech" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <label><span>Výraz v názvu souboru</span><input name="patternInformaceOArtiklech" type="text" placeholder="např. informace_o_artiklech"></label>' +
        '          <p class="form-hint">Hledá se soubor, jehož název obsahuje zadaný výraz a zároveň číslo výchozího LC.</p>' +
        '        </div>' +
        '      </div>' +
        '      <div class="rz-settings-panel is-hidden" data-settings-panel="export">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka pro export rozdělení (URL nebo ID)</span><input name="folderExport" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <p class="form-hint">Sem se bude ukládat vyexportované rozdělení jako .xlsx i jako Google Sheet. Samotný export se dokončí, až bude domluvený formát listu.</p>' +
        '        </div>' +
        '      </div>' +
        '      <div class="rz-settings-panel is-hidden" data-settings-panel="zobrazeni">' +
        '        <div class="form form-plain">' +
        '          <label><span>Barevná škála sloupce Příděl</span>' +
        '            <select name="prideliScaleMode" id="rzScaleMode">' +
        '              <option value="2color">Dvoubarevná (nejnižší → nejvyšší)</option>' +
        '              <option value="3color">Tříbarevná (nejnižší → prostřední → nejvyšší)</option>' +
        '              <option value="none">Bez barevného zvýraznění</option>' +
        '            </select>' +
        '          </label>' +
        '          <div id="rzScaleColors">' +
        '            <div class="rz-color-row">' +
        '              <label><span>Nejnižší hodnota</span><input type="color" name="prideliColorLow"></label>' +
        '              <label id="rzScaleMidRow"><span>Prostřední hodnota</span><input type="color" name="prideliColorMid"></label>' +
        '              <label><span>Nejvyšší hodnota</span><input type="color" name="prideliColorHigh"></label>' +
        '            </div>' +
        '            <div class="rz-color-preview" id="rzColorPreview"></div>' +
        '            <p class="form-hint">Škála se počítá přes hodnoty Příděl napříč všemi zobrazenými artikly najednou (jako Excel Color Scales).</p>' +
        '          </div>' +
        '        </div>' +
        '      </div>' +
        '    </div>' +
        '    <footer class="modal-actions">' +
        '      <button class="button button-secondary" type="button" id="rzCancelSettingsBtn"><svg><use href="#i-close"></use></svg>Zrušit</button>' +
        '      <button class="button button-primary" type="submit"><svg><use href="#i-check"></use></svg>Uložit</button>' +
        '    </footer>' +
        '  </form>' +
        '</dialog>' +
        '<dialog class="modal" id="rzSkupinaModal">' +
        '  <form id="rzSkupinaForm">' +
        '    <input type="hidden" name="id" id="rzSkupinaEditId">' +
        '    <header class="modal-header">' +
        '      <span class="modal-icon"><svg><use href="#i-layers"></use></svg></span>' +
        '      <div class="modal-header-text"><p class="kicker">Rozdělovník 20 artiklů</p><h2 id="rzSkupinaModalTitle">Nová skupina</h2></div>' +
        '      <button class="modal-close" type="button" id="rzCloseSkupinaModalBtn" aria-label="Zavřít"><svg><use href="#i-close"></use></svg></button>' +
        '    </header>' +
        '    <div class="modal-body">' +
        '      <div class="form form-plain">' +
        '        <label><span>Název skupiny</span><input type="text" name="nazev" id="rzSkupinaName" placeholder="Např. Wurstttheke"></label>' +
        '        <label><span>Čísla artiklů (jedno na řádek, nebo oddělená čárkou)</span><textarea name="cisla" id="rzSkupinaCisla" rows="8" placeholder="6717079"></textarea></label>' +
        '      </div>' +
        '    </div>' +
        '    <footer class="modal-actions">' +
        '      <button class="button button-secondary" type="button" id="rzSkupinaLoadFromTableBtn">Načíst z tabulky Artikly</button>' +
        '      <button class="button button-secondary" type="button" id="rzCancelSkupinaModalBtn"><svg><use href="#i-close"></use></svg>Zrušit</button>' +
        '      <button class="button button-primary" type="submit"><svg><use href="#i-check"></use></svg>Uložit</button>' +
        '    </footer>' +
        '  </form>' +
        '</dialog>';

      this.container.querySelectorAll('.rz-tabbtn').forEach((btn) => {
        btn.addEventListener('click', () => this.showTab(btn.dataset.tab));
      });
      this.container.querySelector('#rzCloseSettingsBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSettingsModal')));
      this.container.querySelector('#rzCancelSettingsBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSettingsModal')));
      this.container.querySelector('#rzSettingsForm').addEventListener('submit', (e) => { e.preventDefault(); this.saveSettings(e.target); });
      this.container.querySelector('#rzCloseSkupinaModalBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSkupinaModal')));
      this.container.querySelector('#rzCancelSkupinaModalBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSkupinaModal')));
      this.container.querySelector('#rzSkupinaLoadFromTableBtn').addEventListener('click', () => this.loadSkupinaFromTable());
      this.container.querySelector('#rzSkupinaForm').addEventListener('submit', (e) => { e.preventDefault(); this.saveSkupinaModal(e.target); });
      this.container.querySelectorAll('.rz-modal-tabbtn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.settingsTab;
          this.container.querySelectorAll('.rz-modal-tabbtn').forEach((b) => b.classList.toggle('is-active', b === btn));
          this.container.querySelectorAll('.rz-settings-panel').forEach((p) => p.classList.toggle('is-hidden', p.dataset.settingsPanel !== key));
        });
      });
      this.container.querySelector('#rzScaleMode').addEventListener('change', (e) => {
        this._toggleScaleMidRow(e.target.value);
        this._renderColorPreview();
      });
      ['prideliColorLow', 'prideliColorMid', 'prideliColorHigh'].forEach((name) => {
        this.container.querySelector('input[name="' + name + '"]').addEventListener('input', () => this._renderColorPreview());
      });

      this.renderTabContent();
      this.fitHeight();
      if (!this._resizeBound) {
        this._resizeBound = true;
        window.addEventListener('resize', () => this.fitHeight());
      }
    },

    /** Zajistí, že se scrolluje jen seznam Filiálek — zbytek plochy má napevno vypočtenou výšku bez vlastního scrollu. */
    fitHeight() {
      const topbar = document.querySelector('.subapp-topbar');
      const tabbar = this.container.querySelector('.rz-tabbar');
      const footer = document.querySelector('.statusbar');
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      const used = (topbar ? topbar.offsetHeight : 0) + (tabbar ? tabbar.offsetHeight : 0) + (footer ? footer.offsetHeight : 0);
      el.style.height = Math.max(200, window.innerHeight - used) + 'px';
    },

    showTab(key) {
      // Odložené zápisy odeslat hned - po překreslení už z DOM nepůjdou dočíst.
      this.flushPendingWrites();
      this.activeTab = key;
      this.container.querySelectorAll('.rz-tabbtn').forEach((b) => b.classList.toggle('is-active', b.dataset.tab === key));
      const exportBtn = document.querySelector('#rzExportWbBtn');
      if (exportBtn) exportBtn.classList.toggle('is-hidden', key !== 'rozdeleni');
      const recalcAllBtn = document.querySelector('#rzRecalcAllBtn');
      if (recalcAllBtn) recalcAllBtn.classList.toggle('is-hidden', key !== 'rozdeleni');
      this.renderTabContent();
    },

    renderTabContent() {
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      if (this.activeTab === 'artikly') return this.renderArtikly(el);
      if (this.activeTab === 'rozdeleni') return this.renderRozdeleni(el);
      if (RZ_IMPORT_TABS.indexOf(this.activeTab) !== -1) {
        this.renderImportTab(el, this.activeTab);
        if (!this.importData[this.activeTab]) this.loadImportTable(this.activeTab);
      }
    },

    /** Malý barevný čip s ikonou v hlavičce panelu - viz _panelPill, sjednocuje vzhled hlaviček panelů v záložce Artikly. */
    _panelIcon(icon) {
      return '<span class="rzr-panel-icon"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-' + icon + '"></use></svg></span>';
    },

    /** Souhrnný štítek vedle názvu panelu (počet vyplněných řádků, skupin apod.) - informace, kterou by jinak musel uživatel spočítat sám pohledem do tabulky. */
    _panelPill(text) {
      return '<span class="rzr-panel-pill">' + Ui.escape(text) + '</span>';
    },

    renderArtikly(el) {
      const rows = [];
      for (let i = 0; i < RZ_ARTIKLY_ROWS; i++) rows.push(this.artikly[i] || { poradi: i + 1 });
      const dis = this.canWrite ? '' : 'disabled';
      const filledCount = this.artikly.filter((a) => a && a.cislo_artiklu).length;

      el.innerHTML =
        '<div class="rz-layout">' +
        '<div class="rz-artikly-col">' +
        '<section class="panel rz-compact rz-artikly-panel">' +
        '  <div class="panel-header panel-header--compact"><div class="rzr-panel-title">' + this._panelIcon('list') + '<h2>Artikly</h2>' +
        this._panelPill(filledCount + ' / ' + RZ_ARTIKLY_ROWS + ' vyplněno') + '</div>' +
        (this.canWrite ? '<button class="button button-secondary button-small" type="button" id="rzResetArtiklyBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg>Resetovat tabulku</button>' : '') +
        '</div>' +
        '  <div class="table-wrap rz-no-scroll"><table class="rz-artikly-table"><thead><tr><th>Artikl</th><th>Název</th><th>Obsah</th><th>K rozdělení</th><th>Počet dnů</th><th>Metropol</th></tr></thead><tbody>' +
        rows.map((r, i) =>
          '<tr>' +
          '<td><input type="text" data-i="' + i + '" data-f="cislo_artiklu" value="' + Ui.escape(r.cislo_artiklu || '') + '" ' + dis + '></td>' +
          '<td><input type="text" data-i="' + i + '" data-f="nazev" value="' + Ui.escape(r.nazev || '') + '" ' + dis + '></td>' +
          '<td><input type="text" data-i="' + i + '" data-f="obsah" value="' + Ui.escape(r.obsah || '') + '" ' + dis + '></td>' +
          '<td><input type="number" data-i="' + i + '" data-f="k_rozdeleni" value="' + (r.k_rozdeleni != null ? r.k_rozdeleni : '') + '" ' + dis + '></td>' +
          '<td><input type="number" data-i="' + i + '" data-f="pocet_dni" value="' + (r.pocet_dni != null ? r.pocet_dni : '') + '" ' + dis + '></td>' +
          '<td style="text-align:center"><input type="checkbox" data-i="' + i + '" data-f="metropol" ' + (r.metropol ? 'checked' : '') + ' ' + dis + '></td>' +
          '</tr>').join('') +
        '  </tbody></table></div>' +
        '</section>' +
        this.renderSkupinyPanel() +
        '</div>' +
        this.renderImportOverviewPanel() +
        '<section class="panel rz-compact rz-stores-panel">' +
        '  <div class="panel-header panel-header--compact"><div class="rzr-panel-title">' + this._panelIcon('store') + '<h2>Filiálky</h2>' +
        (this.stores.length ? this._panelPill(this.stores.length + ' poboček') : '') + '</div></div>' +
        '  <div class="table-wrap"><table class="rz-stores-table"><thead><tr><th>Prodejna</th><th>Název</th><th>Metropol</th></tr></thead><tbody>' +
        (this.stores.length
          ? this.stores.map((s) => '<tr><td>' + Ui.escape(s.code) + '</td><td>' + Ui.escape(s.name) + '</td><td style="text-align:center">' +
              (s.metropolitni ? '<span class="rzr-metro-tag">M</span>' : '—') + '</td></tr>').join('')
          : '<tr><td colspan="3">Načítám…</td></tr>') +
        '  </tbody></table></div>' +
        '</section>' +
        '</div>';

      if (this.canWrite) {
        el.querySelectorAll('.rz-artikly-table input[data-f="cislo_artiklu"]').forEach((input) => {
          input.addEventListener('blur', () => this.lookupArtikl(Number(input.dataset.i)));
        });
        el.querySelectorAll('.rz-artikly-table input:not([data-f="cislo_artiklu"])').forEach((input) => {
          input.addEventListener(input.type === 'checkbox' ? 'change' : 'blur', () => this.saveArtikly());
        });
        el.querySelector('#rzResetArtiklyBtn').addEventListener('click', () => this.resetArtikly());
        const importBtn = el.querySelector('#rzImportAllBtn');
        if (importBtn) importBtn.addEventListener('click', () => this.importAll());
        const clearImportsBtn = el.querySelector('#rzClearImportsBtn');
        if (clearImportsBtn) clearImportsBtn.addEventListener('click', () => this.clearImports());
        const uploadFilesInput = el.querySelector('#rzUploadFilesInput');
        const uploadFilesBtn = el.querySelector('#rzUploadFilesBtn');
        if (uploadFilesBtn && uploadFilesInput) {
          uploadFilesBtn.addEventListener('click', () => uploadFilesInput.click());
          uploadFilesInput.addEventListener('change', () => {
            this.uploadSyncFiles(uploadFilesInput.files);
            uploadFilesInput.value = '';
          });
        }
        el.querySelectorAll('.rz-syncfile-delete').forEach((btn) => {
          btn.addEventListener('click', () => this.deleteSyncFile(btn.dataset.id, btn.dataset.name));
        });
        const selectAllFiles = el.querySelector('#rzSyncFilesSelectAll');
        if (selectAllFiles) {
          selectAllFiles.addEventListener('change', () => {
            el.querySelectorAll('.rz-syncfile-check').forEach((cb) => { cb.checked = selectAllFiles.checked; });
            this._updateSyncFilesSelectedBtn();
          });
        }
        el.querySelectorAll('.rz-syncfile-check').forEach((cb) => {
          cb.addEventListener('change', () => this._updateSyncFilesSelectedBtn());
        });
        const deleteSelectedFilesBtn = el.querySelector('#rzDeleteSelectedFilesBtn');
        if (deleteSelectedFilesBtn) deleteSelectedFilesBtn.addEventListener('click', () => this.deleteSyncFilesSelected());
        el.querySelectorAll('.rz-skupina-apply').forEach((btn) => {
          btn.addEventListener('click', () => this.applySkupina(btn.dataset.id));
        });
        el.querySelectorAll('.rz-skupina-edit').forEach((btn) => {
          btn.addEventListener('click', () => this.openSkupinaModal(btn.dataset.id));
        });
        el.querySelectorAll('.rz-skupina-delete').forEach((btn) => {
          btn.addEventListener('click', () => this.deleteSkupina(btn.dataset.id));
        });
        const newSkupinaBtn = el.querySelector('#rzNewSkupinaBtn');
        if (newSkupinaBtn) newSkupinaBtn.addEventListener('click', () => this.openSkupinaModal());
      }
    },

    /**
     * Panel pod tabulkou Artikly - sdílená knihovna skupin (často používaných
     * sestav čísel artiklů, viz apiRzListSkupiny/apiRzSaveSkupina). Vytvoření
     * i úprava skupiny probíhá v samostatném modalu (viz openSkupinaModal),
     * ne inline v tomhle panelu. "Vložit" doplní čísla jen do PRÁZDNÝCH řádků
     * tabulky Artikly (už vyplněné řádky se nepřepisují).
     */
    renderSkupinyPanel() {
      const skupiny = this.skupiny || [];
      const pocetSlovo = skupiny.length === 1 ? 'skupina' : (skupiny.length > 0 && skupiny.length < 5 ? 'skupiny' : 'skupin');
      return (
        '<section class="panel rz-compact rz-skupiny-panel">' +
        '  <div class="panel-header panel-header--compact"><div class="rzr-panel-title">' + this._panelIcon('layers') + '<h2>Skupiny artiklů</h2>' +
        (skupiny.length ? this._panelPill(skupiny.length + ' ' + pocetSlovo) : '') + '</div>' +
        (this.canWrite ? '<button class="button button-secondary button-small" type="button" id="rzNewSkupinaBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-plus"></use></svg>Nová skupina</button>' : '') +
        '</div>' +
        '  <div class="panel-body">' +
        (skupiny.length
          ? '<div class="rz-skupiny-list">' +
            skupiny.map((g) => {
              const count = String(g.cisla || '').split(',').filter(Boolean).length;
              return '<div class="rz-skupina-row">' +
                '<span class="rz-skupina-name">' + Ui.escape(g.nazev) + '</span>' +
                '<span class="rz-skupina-count">' + count + ' ' + (count === 1 ? 'artikl' : 'artiklů') + '</span>' +
                (this.canWrite ? '<button type="button" class="button button-secondary button-small rz-skupina-apply" data-id="' + Ui.escape(g.id) + '">Vložit</button>' : '') +
                (this.canWrite ? '<button type="button" class="icon-action rz-skupina-edit" data-id="' + Ui.escape(g.id) + '" title="Upravit skupinu"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-pencil"></use></svg></button>' : '') +
                (this.canWrite ? '<button type="button" class="icon-action icon-action--danger rz-skupina-delete" data-id="' + Ui.escape(g.id) + '" title="Smazat skupinu"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg></button>' : '') +
                '</div>';
            }).join('') +
            '</div>'
          : '<p class="form-hint">Zatím žádné uložené skupiny.</p>') +
        '  </div>' +
        '</section>'
      );
    },

    /** Čísla oddělená novým řádkem, čárkou nebo středníkem - libovolná kombinace (typicky vložená z tabulky/e-mailu). */
    _parseSkupinaCisla(raw) {
      return String(raw || '').split(/[\n,;]+/).map((s) => s.trim()).filter(Boolean);
    },

    /** Otevře modal Skupiny artiklů - prázdný pro novou skupinu, nebo předvyplněný daty existující (id). */
    openSkupinaModal(id) {
      const skupina = id ? (this.skupiny || []).find((g) => g.id === id) : null;
      const modal = this.container.querySelector('#rzSkupinaModal');
      modal.querySelector('#rzSkupinaModalTitle').textContent = skupina ? 'Upravit skupinu' : 'Nová skupina';
      modal.querySelector('#rzSkupinaEditId').value = skupina ? skupina.id : '';
      modal.querySelector('#rzSkupinaName').value = skupina ? (skupina.nazev || '') : '';
      modal.querySelector('#rzSkupinaCisla').value = skupina ? String(skupina.cisla || '').split(',').filter(Boolean).join('\n') : '';
      Ui.openModal(modal);
    },

    /** Uloží modal (název + čísla) - s vyplněným #rzSkupinaEditId přepíše existující skupinu, jinak založí novou. */
    saveSkupinaModal(form) {
      const id = form.elements.id.value || '';
      const nazev = form.elements.nazev.value.trim();
      if (!nazev) { Ui.toast('Vyplňte název skupiny.', 'error'); return; }
      const cisla = this._parseSkupinaCisla(form.elements.cisla.value);
      if (!cisla.length) { Ui.toast('Vyplňte aspoň jedno číslo artiklu.', 'error'); return; }
      Ui.call('apiRzSaveSkupina', { id: id || undefined, nazev: nazev, cisla: cisla }, { silent: true, busy: 'Ukládám skupinu…' })
        .then(() => {
          Ui.closeModal(this.container.querySelector('#rzSkupinaModal'));
          Ui.toast('Skupina „' + nazev + '" byla uložena.');
          return this.loadSkupiny();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /** Volitelná zkratka v modalu - předvyplní čísla artiklů aktuálně vyplněnými hodnotami z tabulky Artikly, modal jinak funguje i bez ní. */
    loadSkupinaFromTable() {
      const artiklyEl = this.container.querySelector('#rzTabContent');
      const cisla = [...artiklyEl.querySelectorAll('.rz-artikly-table input[data-f="cislo_artiklu"]')]
        .map((input) => input.value.trim())
        .filter(Boolean);
      if (!cisla.length) { Ui.toast('Tabulka Artikly je prázdná.', 'error'); return; }
      this.container.querySelector('#rzSkupinaCisla').value = cisla.join('\n');
    },

    /** Doplní čísla artiklů uložené skupiny do prázdných řádků tabulky (vyplněné řádky se nemění) a spustí dohledání Název/Obsah pro nově doplněné řádky. */
    applySkupina(id) {
      const skupina = (this.skupiny || []).find((g) => g.id === id);
      if (!skupina) return;
      const cisla = String(skupina.cisla || '').split(',').filter(Boolean);
      const el = this.container.querySelector('#rzTabContent');
      const inputs = [...el.querySelectorAll('.rz-artikly-table input[data-f="cislo_artiklu"]')];
      const emptyInputs = inputs.filter((input) => !input.value.trim());
      if (!emptyInputs.length) { Ui.toast('Tabulka je plná, uvolněte řádky.', 'error'); return; }

      const toInsert = cisla.slice(0, emptyInputs.length);
      const filledIndexes = [];
      toInsert.forEach((cislo, i) => {
        emptyInputs[i].value = cislo;
        filledIndexes.push(Number(emptyInputs[i].dataset.i));
      });

      if (toInsert.length < cisla.length) {
        Ui.toast('Vloženo ' + toInsert.length + ' z ' + cisla.length + ' artiklů, tabulka měla jen tolik volných řádků.', 'error');
      } else {
        Ui.toast('Skupina „' + skupina.nazev + '" byla vložena.');
      }
      filledIndexes.forEach((idx) => this.lookupArtikl(idx));
    },

    deleteSkupina(id) {
      const skupina = (this.skupiny || []).find((g) => g.id === id);
      Ui.confirm({
        kicker: 'Skupiny artiklů',
        title: 'Smazat skupinu?',
        message: 'Opravdu smazat skupinu „' + ((skupina && skupina.nazev) || '') + '"? Tuto akci nelze vrátit.',
        confirmLabel: 'Smazat',
      }).then((confirmed) => {
        if (!confirmed) return;
        Ui.call('apiRzDeleteSkupina', id, { silent: true, busy: 'Mažu skupinu…' })
          .then(() => { Ui.toast('Skupina byla smazána.'); return this.loadSkupiny(); })
          .catch((e) => Ui.toast(e.message, 'error'));
      });
    },

    /**
     * Přehled importu — mezi tabulkami Artikly a Filiálky: co je ve složce a co
     * se z toho podle nastavení najde (nezávisle na tom, jestli to už máme
     * naimportované), plus tlačítka pro import všeho najednou a pro vymazání
     * naimportovaných dat.
     */
    renderImportOverviewPanel() {
      const overview = this.importOverview;
      const syncFiles = this.syncFiles;
      return (
        '<section class="panel rz-compact rz-import-panel">' +
        '  <div class="panel-header panel-header--compact"><div class="rzr-panel-title">' + this._panelIcon('sync') + '<h2>Import dat</h2>' +
        (overview ? this._panelPill(overview.items.filter((i) => i.found).length + ' / ' + overview.items.length + ' nalezeno') : '') + '</div>' +
        (this.canWrite
          ? '<div style="display:flex;gap:6px;">' +
            '<button class="button button-secondary button-small" type="button" id="rzClearImportsBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg>Vymazat</button>' +
            '<button class="button button-primary button-small" type="button" id="rzImportAllBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-refresh"></use></svg>Importovat</button>' +
            '</div>'
          : '') +
        '  </div>' +
        '  <div class="panel-body">' +
        '    <p class="form-hint">Složka: ' + (syncFiles && syncFiles.folderName ? Ui.escape(syncFiles.folderName) : 'nenastavena — viz Nastavení') + '</p>' +
        (this.canWrite
          ? '<div class="rz-syncfiles-toolbar">' +
            '<button class="button button-secondary button-small" type="button" id="rzUploadFilesBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-plus"></use></svg>Nahrát soubory</button>' +
            '<input type="file" id="rzUploadFilesInput" multiple accept=".xlsx,.xls,.csv" class="is-hidden">' +
            '<button class="button button-secondary button-small is-hidden" type="button" id="rzDeleteSelectedFilesBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg>Smazat vybrané (<span id="rzDeleteSelectedCount">0</span>)</button>' +
            '</div>'
          : '') +
        (!syncFiles
          ? '<p class="form-hint">Načítám…</p>'
          : (syncFiles.files.length
            ? '<ul class="rz-syncfiles-list">' +
              (this.canWrite
                ? '<li class="rz-syncfiles-selectall"><input type="checkbox" id="rzSyncFilesSelectAll"><span class="rz-syncfile-name">Vybrat vše</span></li>'
                : '') +
              syncFiles.files.map((f) => (
                '<li>' +
                (this.canWrite ? '<input type="checkbox" class="rz-syncfile-check" data-id="' + Ui.escape(f.id) + '">' : '') +
                '<span class="rz-syncfile-name">' + Ui.escape(f.name) + '</span>' +
                '<span class="rz-syncfile-date">' + Ui.formatDateTime(f.updatedAt) + '</span>' +
                (this.canWrite ? '<button type="button" class="icon-action icon-action--danger rz-syncfile-delete" data-id="' + Ui.escape(f.id) + '" data-name="' + Ui.escape(f.name) + '" title="Smazat soubor"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg></button>' : '') +
                '</li>'
              )).join('') +
              '</ul>'
            : '<p class="form-hint">Ve složce nejsou žádné soubory.</p>')) +
        (!overview
          ? '<p class="form-hint">Načítám…</p>'
          : '<ul class="rz-import-overview-list">' +
            overview.items.map((item) => (
              '<li>' +
              '<strong>' + Ui.escape(item.label) + '</strong>' +
              '<div class="rz-import-row">' +
              '<span class="' + (item.found ? 'is-found' : 'is-missing') + '">' + (item.found
                ? '✓ ' + Ui.escape(item.fileName) + ' <small>(' + Ui.formatDateTime(item.updatedAt) + ')</small>'
                : '✗ soubor ve složce nenalezen') +
              '</span>' +
              '<span class="rz-import-status-pill ' + (item.importedRowCount > 0 ? 'is-found' : 'is-missing') + '">' + (item.importedRowCount > 0 ? 'naimportováno: ' + item.importedRowCount + ' řádků' : 'zatím nenaimportováno') + '</span>' +
              '</div>' +
              '</li>'
            )).join('') +
            '</ul>') +
        '  </div>' +
        '</section>'
      );
    },

    importAll() {
      Ui.call('apiRzImportAll', null, { silent: true, busy: 'Importuji soubory…' })
        .then((results) => {
          const okCount = results.filter((r) => r.ok).length;
          const failed = results.filter((r) => !r.ok);
          Ui.toast('Naimportováno ' + okCount + '/' + results.length + ' souborů.' +
            (failed.length ? ' Nenaimportováno: ' + failed.map((r) => r.label + ' (' + r.message + ')').join(', ') : ''),
            failed.length ? 'error' : undefined);
          this._sfState = {};
          this._sfViewCache = {};
          this._colWidths = {};
          // Bez tohoto by v this.importData zůstala stará data až do chvíle,
          // kdy uživatel ručně proklikal jednotlivé záložky (loadImportTable se
          // jinak volá jen líně při otevření té které záložky) - MEDIAN/stav v
          // Rozdělení by tak počítalo se starým importem, dokud si toho někdo
          // nevšiml. Načtou se všechny 4 nanovo hned po importu, ať je Rozdělení
          // (i právě otevřená importní záložka) rovnou aktuální.
          return Promise.all(RZ_IMPORT_TABS.map((key) => this.loadImportTable(key)))
            .then(() => this.loadImportOverview());
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    clearImports() {
      Ui.confirm({
        kicker: 'Import dat',
        title: 'Vymazat naimportovaná data?',
        message: 'Smaže se obsah všech 4 naimportovaných tabulek (Odprodej, Teoretické stavy, Vyskladňovací listy, Přidělení po artiklech). Zdrojové soubory ve složce ani Artikly se nezmění. Tuto akci nelze vrátit.',
        confirmLabel: 'Vymazat',
      }).then((confirmed) => {
        if (!confirmed) return;
        Ui.call('apiRzClearImports', null, { silent: true, busy: 'Mažu naimportovaná data…' })
          .then(() => {
            this.importData = {};
            this._sfState = {};
            this._sfViewCache = {};
            this._colWidths = {};
            this._medianCache = {};
            Ui.toast('Naimportovaná data byla vymazána.');
            if (this.activeTab === 'rozdeleni' || RZ_IMPORT_TABS.indexOf(this.activeTab) !== -1) this.renderTabContent();
            return this.loadImportOverview();
          })
          .catch((e) => Ui.toast(e.message, 'error'));
      });
    },

    /** Přečte vybraný soubor jako base64 (bez data: prefixu) - google.script.run neumí posílat File/Blob přímo, jen text/JSON. */
    _readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
        reader.onerror = () => reject(new Error('Soubor „' + file.name + '" se nepodařilo přečíst.'));
        reader.readAsDataURL(file);
      });
    },

    /** Nahraje vybrané soubory do složky se zdrojovými soubory, jeden po druhém (ne najednou - ať je vidět, co se zrovna nahrává, a chyba u jednoho souboru nezastaví zbytek). */
    uploadSyncFiles(fileList) {
      const files = [...(fileList || [])];
      if (!files.length) return;
      const uploadNext = (i) => {
        if (i >= files.length) {
          Ui.toast('Nahráno souborů: ' + files.length + '.');
          this.loadSyncFiles();
          this.loadImportOverview();
          return;
        }
        const file = files[i];
        this._readFileAsBase64(file)
          .then((base64Data) => Ui.call('apiRzUploadSyncFolderFile',
            { name: file.name, mimeType: file.type || 'application/octet-stream', base64Data: base64Data },
            { silent: true, busy: 'Nahrávám ' + file.name + '…' }))
          .catch((e) => { Ui.toast('Nahrání souboru „' + file.name + '" selhalo: ' + e.message, 'error'); })
          .then(() => uploadNext(i + 1));
      };
      uploadNext(0);
    },

    /** Přesune soubor ve složce se zdrojovými soubory do koše na Disku - naimportovaná data v appce zůstávají, dokud se znovu neklikne na Importovat. */
    deleteSyncFile(id, name) {
      Ui.confirm({
        kicker: 'Import dat',
        title: 'Smazat soubor?',
        message: 'Soubor „' + name + '" se přesune do koše na Disku. Naimportovaná data v appce zůstanou beze změny, dokud znovu nekliknete na Importovat.',
        confirmLabel: 'Smazat',
      }).then((confirmed) => {
        if (!confirmed) return;
        Ui.call('apiRzDeleteSyncFolderFile', id, { silent: true, busy: 'Mažu soubor…' })
          .then(() => {
            Ui.toast('Soubor byl smazán.');
            this.loadSyncFiles();
            this.loadImportOverview();
          })
          .catch((e) => Ui.toast(e.message, 'error'));
      });
    },

    /** Zobrazí/skryje tlačítko "Smazat vybrané" a doplní počet podle aktuálně zaškrtnutých souborů. */
    _updateSyncFilesSelectedBtn() {
      const el = this.container.querySelector('#rzTabContent');
      const btn = el.querySelector('#rzDeleteSelectedFilesBtn');
      if (!btn) return;
      const count = el.querySelectorAll('.rz-syncfile-check:checked').length;
      btn.classList.toggle('is-hidden', count === 0);
      const countEl = el.querySelector('#rzDeleteSelectedCount');
      if (countEl) countEl.textContent = count;
    },

    /** Hromadně smaže (přesune do koše) všechny zaškrtnuté soubory - jedno volání serveru (viz apiRzDeleteSyncFolderFiles). */
    deleteSyncFilesSelected() {
      const el = this.container.querySelector('#rzTabContent');
      const ids = [...el.querySelectorAll('.rz-syncfile-check:checked')].map((cb) => cb.dataset.id);
      if (!ids.length) return;
      Ui.confirm({
        kicker: 'Import dat',
        title: 'Smazat vybrané soubory?',
        message: 'Vybraných souborů (' + ids.length + ') se přesune do koše na Disku. Naimportovaná data v appce zůstanou beze změny, dokud znovu nekliknete na Importovat.',
        confirmLabel: 'Smazat',
      }).then((confirmed) => {
        if (!confirmed) return;
        Ui.call('apiRzDeleteSyncFolderFiles', ids, { silent: true, busy: 'Mažu soubory…' })
          .then((res) => {
            const errs = (res && res.errors) || [];
            Ui.toast('Smazáno souborů: ' + ((res && res.deleted) || 0) + '.' + (errs.length ? ' Nezdařilo se: ' + errs.join('; ') : ''),
              errs.length ? 'error' : undefined);
            this.loadSyncFiles();
            this.loadImportOverview();
          })
          .catch((e) => Ui.toast(e.message, 'error'));
      });
    },

    resetArtikly() {
      Ui.confirm({
        kicker: 'Artikly',
        title: 'Resetovat tabulku artiklů?',
        message: 'Smaže se všech 20 řádků (čísla artiklů, názvy, obsah, množství i příznak Metropol) a zároveň i data v záložce Rozdělení (min/max, Úprava po prodejnách) - jinak by po opětovném zadání stejného čísla artiklu zůstala viset stará čísla. Tuto akci nelze vrátit.',
        confirmLabel: 'Resetovat',
      }).then((confirmed) => {
        if (!confirmed) return;
        const el = this.container.querySelector('#rzTabContent');
        el.querySelectorAll('.rz-artikly-table input[type="text"], .rz-artikly-table input[type="number"]').forEach((input) => { input.value = ''; });
        el.querySelectorAll('.rz-artikly-table input[type="checkbox"]').forEach((input) => { input.checked = false; });
        this.saveArtikly();
        this._enqueue('Mažu rozdělení', () => Ui.call('apiRzResetRozdeleni', null, { silent: true }))
          .then(() => this.loadRozdeleni())
          .catch((e) => Ui.toast(e.message, 'error'));
        Ui.toast('Tabulka artiklů byla resetována.');
      });
    },

    /**
     * Podle čísla artiklu (blur na sloupci Artikl) dotáhne Název a Obsah ze
     * souboru Informace o artiklech — na pozadí, beze zablokování plochy.
     * Uloží se rovnou i bez nalezené shody (uživatel mohl zadat i ručně).
     */
    /**
     * Hledání může krátce po sobě selhat (např. dočasná konvertovaná kopie
     * zdrojového souboru se teprve zakládá) - proto se "nenalezeno" nebere
     * hned jako konečný stav, ale zkusí se ještě 3x s rostoucí prodlevou.
     *
     * Průběžný stav ("je pořád aktuální", "kam zapsat výsledek") se řeší přes
     * this.artikly (datový model), NE přes uložené reference na DOM inputy -
     * uživatel může mezi jednotlivými pokusy klidně přepnout na jinou záložku
     * a zase se vrátit; DOM inputy z Artiklů v tu chvíli vůbec neexistují,
     * takže odkaz na ně by hledání tiše zastavil. this.artikly ale existuje
     * pořád, takže výsledek dojde a uloží se, ať je uživatel kdekoliv.
     */
    lookupArtikl(rowIndex) {
      const el = this.container.querySelector('#rzTabContent');
      const cislo = el.querySelector('[data-i="' + rowIndex + '"][data-f="cislo_artiklu"]').value.trim();
      this.saveArtikly();
      if (!cislo) return;

      this._setLookupLoading(rowIndex, true);
      // Zadá-li uživatel víc artiklů rychle za sebou, posbírají se a dohledají
      // jedním voláním - dřív to bylo volání (a otevření zdrojového souboru)
      // na každý artikl zvlášť, což je zdaleka nejdražší operace v appce.
      if (!this._lookupBatch) this._lookupBatch = [];
      this._lookupBatch.push({ rowIndex: rowIndex, cislo: cislo });
      if (this._lookupTimer) clearTimeout(this._lookupTimer);
      this._lookupTimer = setTimeout(() => {
        this._lookupTimer = null;
        const batch = this._lookupBatch;
        this._lookupBatch = [];
        this._runLookupBatch(batch, [1500, 2500, 4000]);
      }, 500);
    },

    /** Odešle dávku dohledání; nenalezené artikly zkusí ještě jednou po prodlevě (viz komentář u lookupArtikl). */
    _runLookupBatch(batch, retryDelaysMs) {
      const pending = batch.filter((b) => this.artikly[b.rowIndex] && this._artiklMatches(this.artikly[b.rowIndex].cislo_artiklu, b.cislo));
      if (!pending.length) {
        batch.forEach((b) => this._setLookupLoading(b.rowIndex, false));
        return;
      }

      this._enqueue('Dohledávám artikly', () => Ui.call('apiRzLookupArtiklBatch', pending.map((b) => b.cislo), { silent: true }))
        .then((map) => {
          const found = map || {};
          const missing = [];
          pending.forEach((b) => {
            const info = found[b.cislo];
            if (info && (info.nazev || info.obsah)) {
              this._applyLookupResult(b.rowIndex, info.nazev || '', info.obsah || '');
            } else {
              missing.push(b);
            }
          });
          if (!missing.length) return;
          if (retryDelaysMs.length) {
            setTimeout(() => this._runLookupBatch(missing, retryDelaysMs.slice(1)), retryDelaysMs[0]);
            return;
          }
          missing.forEach((b) => this._applyLookupResult(b.rowIndex, 'Nenalezeno — zadejte ručně', (this.artikly[b.rowIndex] || {}).obsah || ''));
        })
        .catch((e) => {
          pending.forEach((b) => this._setLookupLoading(b.rowIndex, false));
          Ui.toast(e.message, 'error');
        });
    },

    /** Zapne/vypne vizuální indikaci vyhledávání na polích Název/Obsah - jen pokud je uživatel právě na záložce Artikly a řádek je vykreslený, jinak na DOM nesahá. */
    _setLookupLoading(rowIndex, isLoading) {
      if (this.activeTab !== 'artikly') return;
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      ['nazev', 'obsah'].forEach((f) => {
        const input = el.querySelector('[data-i="' + rowIndex + '"][data-f="' + f + '"]');
        if (!input) return;
        input.classList.toggle('is-loading', isLoading);
        input.placeholder = isLoading ? 'Vyhledávám…' : '';
      });
    },

    /** Zapíše výsledek vyhledání do this.artikly a uloží na server - funguje i když uživatel mezitím přepnul na jinou záložku. Je-li Artikly zrovna vykreslené, promítne se rovnou i do živých polí. */
    _applyLookupResult(rowIndex, nazev, obsah) {
      if (!this.artikly[rowIndex]) return;
      this.artikly[rowIndex] = Object.assign({}, this.artikly[rowIndex], { nazev: nazev, obsah: obsah });
      this._persistArtikly(this.artikly.slice());
      this._setLookupLoading(rowIndex, false);
      if (this.activeTab === 'artikly') {
        const el = this.container.querySelector('#rzTabContent');
        const nazevInput = el && el.querySelector('[data-i="' + rowIndex + '"][data-f="nazev"]');
        const obsahInput = el && el.querySelector('[data-i="' + rowIndex + '"][data-f="obsah"]');
        if (nazevInput) nazevInput.value = nazev;
        if (obsahInput) obsahInput.value = obsah;
      }
    },

    /**
     * Uloží pole na server a promítne do this.artikly - odděleno od čtení
     * DOM (viz saveArtikly), aby šlo uložit i výsledek vyhledání, které
     * doběhne na pozadí, když už Artikly nejsou vykreslené. Číslo požadavku
     * zaručí, že se do this.artikly nakonec zapíše výsledek jen TOHO
     * NEJNOVĚJI vyslaného uložení, ne to, co náhodou dorazí poslední.
     */
    _persistArtikly(rows) {
      this.artikly = rows;
      this._artiklyDirty = true;
      const reqId = ++this._artiklySaveReqId;
      // Odloženo a slučováno pod jedním klíčem: payload je vždy kompletní stav
      // všech 20 řádků, takže víc změn za sebou = jedno volání s tou poslední verzí.
      this._enqueueDebounced('Ukládám artikly', () =>
        Ui.call('apiRzSaveArtikly', rows, { silent: true })
          .then((saved) => {
            if (reqId !== this._artiklySaveReqId) return;
            this.artikly = saved;
          }),
        'artikly');
    },

    /**
     * Volá se na blur z každého pole tabulky Artiklů - čte aktuální obsah
     * polí (proto vyžaduje, aby Artikly byly zrovna vykreslené) a uloží přes
     * _persistArtikly, které this.artikly aktualizuje HNED, ne až z odpovědi
     * serveru. Bez toho by přepnutí na jinou záložku a rychlý návrat (dřív,
     * než dorazí odpověď na uložení) zobrazilo ještě staré/prázdné
     * this.artikly, i když v DB už byla čerstvá data uložená.
     */
    saveArtikly() {
      const el = this.container.querySelector('#rzTabContent');
      const rows = [];
      for (let i = 0; i < RZ_ARTIKLY_ROWS; i++) {
        const get = (f) => el.querySelector('[data-i="' + i + '"][data-f="' + f + '"]');
        rows.push({
          poradi: i + 1,
          cislo_artiklu: get('cislo_artiklu').value.trim(),
          nazev: get('nazev').value.trim(),
          obsah: get('obsah').value.trim(),
          k_rozdeleni: get('k_rozdeleni').value,
          pocet_dni: get('pocet_dni').value,
          metropol: get('metropol').checked,
        });
      }
      return this._persistArtikly(rows);
    },

    /**
     * Jeden blok na každý vyplněný artikl z Artiklů, vedle sebe ve vodorovně
     * scrollovatelném pásu. Vlevo je zamrzlý sloupec Prodejna (position:
     * sticky, sdílený pro všechny bloky) - protože je to všechno JEDNA
     * scrollovací oblast (frozen sloupec + bloky jsou sourozenci v jednom
     * flex řádku), svislý scroll je automaticky společný, žádné ruční
     * synchronizování dvou scrollbarů.
     *
     * Barvení sloupce Příděl (viz _recolorAllPrideli) běží NAD hotovým DOM,
     * ne během generování HTML - stejná funkce se volá po prvním vykreslení
     * i po každé "online" úpravě (RW/min-max/ruční příděl), takže škála i
     * pozice čísla jsou vždy stejné, ať se hodnoty změnily jakkoliv.
     */
    renderRozdeleni(el) {
      const artikly = this.artikly.filter((a) => a && a.cislo_artiklu);
      if (!this.stores.length || this.rozdeleni === null || !artikly.length) {
        el.innerHTML = '<section class="panel"><div class="panel-body"><p class="form-hint">' +
          (!artikly.length ? 'Nejsou vyplněné žádné artikly — doplňte je v záložce Artikly.' : 'Načítám…') +
          '</p></div></section>';
        return;
      }

      const { byArtikl, byStore } = this._rozdeleniLookup();
      const dis = this.canWrite ? '' : ' disabled';

      const frozenRows = this.stores.map((s) => '<div class="rzr-hrow rzr-store-cell">' + Ui.escape(s.code) + '</div>').join('');
      const rwToPersist = [];

      const computed = artikly.map((a) => {
        const cislo = a.cislo_artiklu;
        const minMax = byArtikl[cislo] || {};
        const upravy = byStore[cislo] || {};
        const perStore = this._computeMedianTeo(cislo);
        const target = (a.k_rozdeleni !== '' && a.k_rozdeleni != null) ? Number(a.k_rozdeleni) || 0 : 0;

        // Metropol artikl se rozděluje jen na Metropol filiálky - ostatní jsou
        // z výpočtu (i z cílového součtu ve _solveRw) úplně vyloučené.
        const eligible = (s) => !a.metropol || !!s.metropolitni;

        // Stav = Teo. stav + Dodáno (Vyskladňovací listy) + Karton (Přidělení
        // po artiklech) - zobrazuje se rovnou tahle kombinovaná hodnota, ať
        // tabulka ukazuje totéž, co se počítá.
        const stavProVypocet = (s) => {
          const v = perStore[s.code] || {};
          if (v.teo == null && v.dodano == null && v.prideleno == null) return null;
          return (v.teo || 0) + (v.dodano || 0) + (v.prideleno || 0);
        };

        let rw = (minMax.rw !== '' && minMax.rw != null) ? Number(minMax.rw) : null;
        if (rw === null) {
          const storeData = this.stores.filter(eligible).map((s) => ({ median: (perStore[s.code] || {}).median || 0, stav: stavProVypocet(s) }));
          rw = this._solveRw(target, storeData, minMax.min, minMax.max, minMax.zaokrouhlit);
          rwToPersist.push({ cislo: cislo, rw: rw });
        }

        let rozdeleno = 0;
        const storeRows = this.stores.map((s) => {
          const vals = perStore[s.code] || {};
          const stav = stavProVypocet(s);
          const isEligible = eligible(s);
          const base = isEligible ? this._clampPrideli(rw, vals.median || 0, stav, minMax.min, minMax.max, minMax.zaokrouhlit) : 0;
          const delta = isEligible ? (this._toNumber(upravy[s.code]) || 0) : 0;
          const efektivni = Math.max(0, base + delta);
          rozdeleno += efektivni;
          return { store: s, median: vals.median, stav: stav, efektivni: efektivni, delta: delta, eligible: isEligible, vals: vals };
        });

        return { a: a, cislo: cislo, minMax: minMax, rw: rw, target: target, rozdeleno: rozdeleno, storeRows: storeRows };
      });

      const blocks = computed.map((c) => {
        const esc = Ui.escape(c.cislo);
        const dataRows = c.storeRows.map((r) => {
          // Pevně vyhrazený slot na deltu (i prázdný) - hodnota Příděl tak
          // nikdy nemění pozici podle toho, jestli je nebo není upravená.
          return '<div class="rzr-hrow rzr-data-row">' +
            '<span title="' + Ui.escape(this._medianTooltip(r.vals)) + '">' + (r.median != null ? this._fmtNum(r.median) : '—') + '</span>' +
            '<span title="' + Ui.escape(this._stavTooltip(r.vals)) + '">' + (r.stav != null ? this._fmtNum(r.stav) : '—') + '</span>' +
            '<div class="rzr-prideli-cell' + (r.eligible ? '' : ' is-excluded') + '" data-cislo="' + esc + '" data-store="' + Ui.escape(r.store.code) + '">' +
            '<span class="rzr-prideli-num">' + this._fmtNum(r.efektivni) + '</span>' +
            '<span class="rzr-prideli-delta' + this._deltaClass(r.delta) + '">' + (r.delta ? '<b>' + (r.delta > 0 ? '+' : '') + this._fmtNum(r.delta) + '</b>' : '') + '</span>' +
            (this.canWrite && r.eligible ?
              '<span class="rzr-prideli-btns">' +
              '<button class="rzr-prideli-btn" type="button" data-dir="-1" aria-label="Snížit příděl">−</button>' +
              '<button class="rzr-prideli-btn" type="button" data-dir="1" aria-label="Zvýšit příděl">+</button>' +
              '</span>'
              : '') +
            '</div>' +
            (c.a.metropol ? '<div class="rzr-metro-col">' + (r.eligible ? '<span class="rzr-metro-tag">M</span>' : '') + '</div>' : '') +
            '</div>';
        }).join('');

        return (
          '<div class="rzr-block' + (c.a.metropol ? ' has-metro' : '') + '">' +
          '  <div class="rzr-block-head">' +
          '    <div class="rzr-artikl-row"><strong>' + esc + '</strong><span>' + Ui.escape(c.a.nazev || '') + '</span>' +
          (c.a.metropol ? '<span class="rzr-metro-badge" title="Rozděluje se jen na Metropolitní filiálky">M</span>' : '') +
          '</div>' +
          '    <div class="rzr-progress" data-cislo="' + esc + '">' + this._progressHtml(c.rozdeleno, c.target) + '</div>' +
          '    <div class="rzr-limits">' +
          '      <label><span>MIN</span><input type="text" inputmode="decimal" class="rzr-minmax" data-cislo="' + esc + '" data-field="min" value="' + (c.minMax.min != null && c.minMax.min !== '' ? this._fmtNum(c.minMax.min) : '') + '"' + dis + '></label>' +
          '      <label><span>MAX</span><input type="text" inputmode="decimal" class="rzr-minmax" data-cislo="' + esc + '" data-field="max" value="' + (c.minMax.max != null && c.minMax.max !== '' ? this._fmtNum(c.minMax.max) : '') + '"' + dis + '></label>' +
          '      <label><span>ZAOKR.</span><input type="text" inputmode="decimal" class="rzr-minmax" data-cislo="' + esc + '" data-field="zaokrouhlit" value="' + (c.minMax.zaokrouhlit != null && c.minMax.zaokrouhlit !== '' ? this._fmtNum(c.minMax.zaokrouhlit) : '') + '"' + dis + '></label>' +
          '    </div>' +
          '    <div class="rzr-rw-bar">' +
          '      <span class="rzr-rw-label">RW</span>' +
          (this.canWrite ? '<button class="rzr-step" type="button" data-cislo="' + esc + '" data-step="-0.1" aria-label="Snížit RW">−</button>' : '') +
          '      <input type="number" step="0.1" class="rzr-rw" data-cislo="' + esc + '" value="' + c.rw + '"' + dis + '>' +
          (this.canWrite ? '<button class="rzr-step" type="button" data-cislo="' + esc + '" data-step="0.1" aria-label="Zvýšit RW">+</button>' : '') +
          (this.canWrite ? '<button class="rzr-rw-recalc" type="button" data-cislo="' + esc + '" title="Přepočítat RW podle aktuálního vzorce" aria-label="Přepočítat RW">⟲</button>' : '') +
          '    </div>' +
          '    <div class="rzr-hrow rzr-cols-row"><span>MEDIAN</span><span>Teo. stav</span><span>Příděl</span>' + (c.a.metropol ? '<span class="rzr-metro-col-head"></span>' : '') + '</div>' +
          '  </div>' +
          '  <div class="rzr-block-body">' + dataRows + '</div>' +
          '</div>'
        );
      }).join('');

      el.innerHTML =
        '<div class="rzr-scroll rz-compact">' +
        '  <div class="rzr-frozen">' +
        '    <div class="rzr-frozen-head">' +
        '      <div class="rzr-frozen-spacer"></div>' +
        '      <div class="rzr-hrow rzr-cols-row"><span>Prodejna</span></div>' +
        '    </div>' +
        '    <div class="rzr-frozen-body">' + frozenRows + '</div>' +
        '  </div>' +
        blocks +
        '</div>';

      if (this.canWrite) {
        el.querySelectorAll('.rzr-minmax').forEach((input) => {
          input.addEventListener('input', () => this._recomputeBlockLive(input.dataset.cislo));
          input.addEventListener('blur', () => this.saveRozdeleniMinMax(input.dataset.cislo));
        });
        el.querySelectorAll('.rzr-rw').forEach((input) => {
          // input = při každé změně (psaní i klik na šipky) - okamžitý přepočet Příděl/Rozděleno bez čekání na uložení.
          input.addEventListener('input', () => this._recomputeBlockLive(input.dataset.cislo));
          input.addEventListener('blur', () => this.saveRozdeleniRw(input.dataset.cislo));
        });
        el.querySelectorAll('.rzr-step').forEach((btn) => {
          btn.addEventListener('click', () => this.stepRw(btn.dataset.cislo, Number(btn.dataset.step)));
        });
        el.querySelectorAll('.rzr-rw-recalc').forEach((btn) => {
          btn.addEventListener('click', () => this.recomputeRw(btn.dataset.cislo));
        });
        el.querySelectorAll('.rzr-prideli-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            const cell = btn.closest('.rzr-prideli-cell');
            this.adjustPrideli(cell.dataset.cislo, cell.dataset.store, Number(btn.dataset.dir));
          });
        });
      }

      // Zamrzlý sloupec Prodejna musí mít stejně vysoký "prázdný" úsek jako
      // hlavička bloků, aby řádky prodejen seděly na řádky dat. Měří se z
      // reálné výšky, ne pevným číslem v CSS - jinak by se to rozjelo při
      // každé úpravě hlavičky.
      const headEl = el.querySelector('.rzr-block-head');
      const spacerEl = el.querySelector('.rzr-frozen-spacer');
      const colsEl = el.querySelector('.rzr-block-head .rzr-cols-row');
      if (headEl && spacerEl && colsEl) {
        spacerEl.style.height = (headEl.offsetHeight - colsEl.offsetHeight) + 'px';
      }

      this._recolorAllPrideli();

      // Nově dopočítaná RW (viz výše) se rovnou uloží, ať je od dalšího
      // vykreslení už jen "uživatelova" uložená hodnota, ne odhad počítaný
      // pokaždé znovu. Pro víc artiklů najednou (typicky při prvním otevření
      // záložky) se posílá jako jedna dávka - jinak by to bylo tolik
      // samostatných round-tripů (a zámků na serveru), kolik je artiklů.
      if (this.canWrite && rwToPersist.length) {
        rwToPersist.forEach(({ cislo, rw }) => this._upsertRozdeleniLocal(cislo, '', { rw: rw }));
        this._enqueue('Ukládám RW', () => Ui.call('apiRzSaveRozdeleniRwBatch', rwToPersist, { silent: true }))
          .catch((e) => Ui.toast(e.message, 'error'));
      }
    },

    /** Barva delty u ruční úpravy Příděl - kladná zeleně, záporná červeně. */
    _deltaClass(delta) {
      if (delta > 0) return ' is-positive';
      if (delta < 0) return ' is-negative';
      return '';
    },

    /**
     * Ukazatel "kolik už je rozděleno z cílového množství" - zlomek, odznak se
     * zbytkem a proužek naplnění. Stav nese barva: zelená jen při přesné
     * shodě, modrá dokud zbývá rozdělit, jantarová při překročení. Odznak
     * říká rovnou KOLIK zbývá/přebývá, ať to uživatel nemusí odečítat z hlavy
     * při ladění RW. Sdílené prvním renderem i živým přepočtem.
     */
    _progressHtml(rozdeleno, target) {
      const done = Number(rozdeleno) || 0;
      const goal = Number(target) || 0;
      const diff = done - goal;
      let stav = 'is-under';
      let badge = 'zbývá ' + this._fmtNum(-diff);
      if (!goal) {
        stav = 'is-none';
        badge = 'bez cíle';
      } else if (diff === 0) {
        stav = 'is-exact';
        badge = '✓ přesně';
      } else if (diff > 0) {
        stav = 'is-over';
        badge = '+' + this._fmtNum(diff) + ' navíc';
      }
      const pct = goal ? Math.min(100, (done / goal) * 100) : 0;
      return (
        '<div class="rzr-progress-top ' + stav + '">' +
        '<span class="rzr-progress-num">' + this._fmtNum(done) + '</span>' +
        '<span class="rzr-progress-goal">/ ' + (goal ? this._fmtNum(goal) : '—') + '</span>' +
        '<span class="rzr-progress-badge">' + badge + '</span>' +
        '</div>' +
        '<div class="rzr-progress-track"><div class="rzr-progress-fill ' + stav + '" style="width:' + pct + '%"></div></div>'
      );
    },

    /** { byArtikl: {cislo: {min,max,rw,zaokrouhlit}}, byStore: {cislo: {prodejna: uprava}} } */
    _rozdeleniLookup() {
      const byArtikl = {};
      const byStore = {};
      (this.rozdeleni || []).forEach((r) => {
        if (!r.prodejna) {
          byArtikl[r.cislo_artiklu] = { min: r.min, max: r.max, rw: r.rw, zaokrouhlit: r.zaokrouhlit };
        } else {
          if (!byStore[r.cislo_artiklu]) byStore[r.cislo_artiklu] = {};
          byStore[r.cislo_artiklu][r.prodejna] = r.uprava;
        }
      });
      return { byArtikl, byStore };
    },

    /** Porovná číslo artiklu z importu s číslem z Artiklů - kromě přesné shody textu i číselně, kdyby se lišilo jen formátováním (např. koncová ".0" po převodu čísla na text). */
    _artiklMatches(cellVal, cislo) {
      const a = String(cellVal).trim();
      const b = String(cislo).trim();
      if (a === b) return true;
      const na = Number(a), nb = Number(b);
      return !isNaN(na) && !isNaN(nb) && na === nb;
    },

    /** Najde index sloupce podle kousku názvu (bez diakritiky) - hlavičky Odprodeje/Teo. stavů odpovídají přesně zdrojovému souboru, proto se nedá spoléhat na pevný název. */
    _findColIndex(headers, candidates) {
      const norm = (s) => String(s).trim().toLowerCase().normalize('NFD').replace(/[^\x00-\x7F]/g, '');
      const normed = headers.map(norm);
      for (const cand of candidates) {
        const idx = normed.findIndex((h) => h.indexOf(cand) !== -1);
        if (idx !== -1) return idx;
      }
      return -1;
    },

    /** Stejné jako _findColIndex, ale hledá jen přesnou shodu názvu - potřeba u Vyskladňovacích listů, kde sloupec "Artikl" obsahuje jiný (delší interní) kód a skutečné číslo artiklu je ve sloupci "Art"; hledání podle podřetězce by se vždy trefilo do "Artikl" prvního. */
    _findColIndexExact(headers, candidates) {
      const norm = (s) => String(s).trim().toLowerCase().normalize('NFD').replace(/[^\x00-\x7F]/g, '');
      const normed = headers.map(norm);
      for (const cand of candidates) {
        const idx = normed.indexOf(cand);
        if (idx !== -1) return idx;
      }
      return -1;
    },

    _median(nums) {
      if (!nums.length) return 0;
      const sorted = nums.slice().sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    },

    _fmtNum(n) {
      return Number(n).toLocaleString('cs-CZ', { maximumFractionDigits: 2 });
    },

    /**
     * MEDIAN = medián "Prodáno v kartonech" z Odprodeje pro daný artikl, po
     * prodejnách. teo = poslední (nejnovější podle data) hodnota teoretického
     * stavu z Teo. stavů, přepočtená na kartony (Stav v ks ÷ Obsah). dodano =
     * součet sloupce "Dodáno" z Vyskladňovacích listů (zboží skutečně
     * doručené na prodejnu, které ještě nemusí být v Teo. stavu promítnuté; je
     * už v kartonech, nepřepočítává se). prideleno = součet sloupce "Karton"
     * z Přidělení po artiklech (artikl podle sloupce "Art", ne "Artikl" - viz
     * poznámka u Vyskladňovacích listů níže); 1 karton = 1 kolli, bez
     * přepočtu. Zobrazený sloupec "Teo. stav" i výpočet přídělu
     * (_clampPrideli) používají stejnou hodnotu: teo + dodano + prideleno
     * (viz stavProVypocet v renderRozdeleni).
     */
    /** Obal s cache - samotný výpočet (_computeMedianTeoRaw) prochází ~13 tisíc řádků importů, ale volá se i z _recomputeBlockLive při KAŽDÉM stisku klávesy v RW/min/max. Výsledek závisí jen na naimportovaných datech, takže se cachuje a maže až při novém importu/vymazání. */
    _computeMedianTeo(cisloArtiklu) {
      if (!this._medianCache) this._medianCache = {};
      const key = String(cisloArtiklu);
      if (this._medianCache[key]) return this._medianCache[key];
      const res = this._computeMedianTeoRaw(cisloArtiklu);
      this._medianCache[key] = res;
      return res;
    },

    _computeMedianTeoRaw(cisloArtiklu) {
      const result = {};
      const od = this.importData.odprodej;
      if (od && od.headers && od.headers.length) {
        const ciP = this._findColIndex(od.headers, ['prodejna']);
        const ciA = this._findColIndex(od.headers, ['artikl']);
        const ciKart = this._findColIndex(od.headers, ['prodano v kartonech']);
        if (ciP !== -1 && ciA !== -1 && ciKart !== -1) {
          const byStore = {};
          od.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const val = this._toNumber(r[ciKart]);
            if (isNaN(val)) return;
            (byStore[store] = byStore[store] || []).push(val);
          });
          Object.keys(byStore).forEach((store) => {
            result[store] = result[store] || {};
            result[store].median = this._median(byStore[store]);
            // Jednotlivé hodnoty jen pro tooltip (viz _medianTooltip) - ne pro samotný výpočet.
            result[store].medianValues = byStore[store];
          });
        }
      }

      const teo = this.importData.teo_stavy;
      if (teo && teo.headers && teo.headers.length) {
        const ciP = this._findColIndex(teo.headers, ['prodejna']);
        const ciA = this._findColIndex(teo.headers, ['artikl']);
        const ciD = this._findColIndex(teo.headers, ['datum']);
        const ciS = this._findColIndex(teo.headers, ['teoreticky stav', 'teor. stav', 'stav']);
        const ciObsah = this._findColIndex(teo.headers, ['obsah']);
        if (ciP !== -1 && ciA !== -1 && ciS !== -1 && ciObsah !== -1) {
          const latest = {};
          teo.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const stavKs = this._toNumber(r[ciS]);
            const obsah = this._toNumber(r[ciObsah]);
            if (isNaN(stavKs) || isNaN(obsah) || !obsah) return;
            const val = stavKs / obsah;
            const dateVal = ciD !== -1 ? (this._parseDate(r[ciD]) || 0) : 0;
            const dateDisplay = ciD !== -1 ? String(r[ciD]).trim() : '';
            if (!latest[store] || dateVal >= latest[store].dateVal) latest[store] = { val, dateVal, stavKs, obsah, dateDisplay };
          });
          Object.keys(latest).forEach((store) => {
            result[store] = result[store] || {};
            result[store].teo = latest[store].val;
            // Jen pro tooltip (viz _stavTooltip) - zdrojová Ks/Obsah/datum poslední použité hodnoty.
            result[store].teoKs = latest[store].stavKs;
            result[store].teoObsah = latest[store].obsah;
            result[store].teoDateDisplay = latest[store].dateDisplay;
          });
        }
      }

      const vysklad = this.importData.vyskladnovaci_listy;
      if (vysklad && vysklad.headers && vysklad.headers.length) {
        const ciP = this._findColIndex(vysklad.headers, ['prodejna']);
        // Pozor: sloupec "Artikl" tu obsahuje jiný (delší interní) kód - skutečné
        // číslo artiklu je ve sloupci "Art", proto přesná shoda, ne podřetězec.
        const ciA = this._findColIndexExact(vysklad.headers, ['art']);
        const ciDod = this._findColIndex(vysklad.headers, ['dodano']);
        if (ciP !== -1 && ciA !== -1 && ciDod !== -1) {
          const byStore = {};
          vysklad.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const val = this._toNumber(r[ciDod]);
            if (isNaN(val)) return;
            (byStore[store] = byStore[store] || []).push(val);
          });
          Object.keys(byStore).forEach((store) => {
            result[store] = result[store] || {};
            result[store].dodano = byStore[store].reduce((a, b) => a + b, 0);
            result[store].dodanoCount = byStore[store].length;
            // Jednotlivé hodnoty jen pro tooltip (viz _stavTooltip).
            result[store].dodanoValues = byStore[store];
          });
        }
      }

      const prideleni = this.importData.prideleni_po_artiklech;
      if (prideleni && prideleni.headers && prideleni.headers.length) {
        const ciP = this._findColIndex(prideleni.headers, ['prodejna']);
        // Pozor: sloupec "Artikl" tu obsahuje jiný (delší interní) kód -
        // skutečné číslo artiklu je ve sloupci "Art", stejně jako u
        // Vyskladňovacích listů - proto přesná shoda, ne podřetězec.
        const ciA = this._findColIndexExact(prideleni.headers, ['art']);
        const ciKarton = this._findColIndex(prideleni.headers, ['karton']);
        if (ciP !== -1 && ciA !== -1 && ciKarton !== -1) {
          const byStore = {};
          prideleni.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const val = this._toNumber(r[ciKarton]);
            if (isNaN(val)) return;
            (byStore[store] = byStore[store] || []).push(val);
          });
          Object.keys(byStore).forEach((store) => {
            result[store] = result[store] || {};
            // 1 karton = 1 kolli, žádný přepočet přes Obsah.
            result[store].prideleno = byStore[store].reduce((a, b) => a + b, 0);
            result[store].prideleneCount = byStore[store].length;
            // Jednotlivé hodnoty jen pro tooltip (viz _stavTooltip).
            result[store].prideleneValues = byStore[store];
          });
        }
      }

      return result;
    },

    /** Tooltip nad hodnotou MEDIAN - ze kterých hodnot "Prodáno v kartonech" (Odprodej) se počítala. */
    _medianTooltip(vals) {
      const values = vals && vals.medianValues;
      if (!values || !values.length) return 'Žádná data z Odprodeje pro tuto prodejnu.';
      const sorted = values.slice().sort((a, b) => a - b).map((v) => this._fmtNum(v));
      const pocetSlovo = values.length === 1 ? 'hodnota' : (values.length < 5 ? 'hodnoty' : 'hodnot');
      return 'Medián "Prodáno v kartonech" z Odprodeje (' + values.length + ' ' + pocetSlovo + ')\n' +
        'Hodnoty: ' + sorted.join(', ') + '\n' +
        'Medián = ' + this._fmtNum(this._median(values));
    },

    /** Tooltip nad hodnotou Teo. stav - rozpis Teo. stav + Dodáno + Karton, s jednotlivými hodnotami řádků Dodáno/Karton každou na svém řádku (ze stejného důvodu jako u MEDIAN - je vidět, z čeho se součet sesbíral). */
    _stavTooltip(vals) {
      if (!vals) return 'Žádná data pro tuto prodejnu.';
      const lines = [];
      if (vals.teo != null) {
        lines.push('Teo. stav: ' + this._fmtNum(vals.teoKs) + ' ks ÷ ' + this._fmtNum(vals.teoObsah) + ' (obsah)' +
          (vals.teoDateDisplay ? ', nejnovější záznam ' + vals.teoDateDisplay : '') + ' = ' + this._fmtNum(vals.teo));
      } else {
        lines.push('Teo. stav: žádná data z Teo. stavů');
      }
      if (vals.dodano != null) {
        lines.push('');
        lines.push('Dodáno (Vyskladňovací listy, ' + vals.dodanoCount + (vals.dodanoCount === 1 ? ' řádek' : ' řádků') + '):');
        (vals.dodanoValues || []).forEach((v) => lines.push(this._fmtNum(v)));
        lines.push('Součet = ' + this._fmtNum(vals.dodano));
      }
      if (vals.prideleno != null) {
        lines.push('');
        lines.push('Karton (Přidělení po artiklech, ' + vals.prideleneCount + (vals.prideleneCount === 1 ? ' řádek' : ' řádků') + '):');
        (vals.prideleneValues || []).forEach((v) => lines.push(this._fmtNum(v)));
        lines.push('Součet = ' + this._fmtNum(vals.prideleno));
      }
      lines.push('');
      lines.push('Celkem = ' + this._fmtNum((vals.teo || 0) + (vals.dodano || 0) + (vals.prideleno || 0)));
      return lines.join('\n');
    },

    /**
     * Vodorovné doplňování (Reichweite): příděl prodejny = RW × MEDIAN − Stav,
     * zaokrouhleno na celé číslo, pak (je-li zadáno) přezaokrouhleno na
     * nejbližší násobek hodnoty "Zaokrouhlit", a nakonec ohraničeno min/max
     * (pokud jsou zadané - jinak jen spodní hranice 0, žádný záporný příděl) -
     * min/max je vždy tvrdá hranice, i kdyby zaokrouhlení mírně přesáhlo.
     * Stav = Teo. stav + Dodáno (Vyskladňovací listy) + Karton (Přidělení po
     * artiklech) - viz stavProVypocet v renderRozdeleni / _computeMedianTeoRaw.
     */
    _clampPrideli(rw, median, stav, min, max, zaokrouhlit) {
      let v = Math.round(rw * median - stav);
      const zaokr = (zaokrouhlit !== '' && zaokrouhlit != null) ? Number(zaokrouhlit) : 0;
      if (zaokr > 0) v = Math.round(v / zaokr) * zaokr;
      const lo = (min !== '' && min != null) ? Number(min) : 0;
      const hi = (max !== '' && max != null) ? Number(max) : Infinity;
      if (v < lo) v = lo;
      if (v > hi) v = hi;
      return v;
    },

    /** Najde RW tak, aby součet přídělů (po zaokrouhlení a ohraničení min/max) byl co nejblíž cílovému množství (k rozdělení) - součet je v RW neklesající, takže stačí půlení intervalu. */
    _solveRw(target, storeData, min, max, zaokrouhlit) {
