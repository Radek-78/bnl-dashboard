<script>
(function () {
  const RZ_TABS = [
    { key: 'artikly', label: 'Artikly' },
    { key: 'rozdeleni', label: 'Rozdělení' },
    { key: 'odprodej', label: 'Odprodej' },
    { key: 'teo_stavy', label: 'Teo. stavy' },
    { key: 'vyskladnovaci_listy', label: 'Vyskladňovací listy' },
    { key: 'prideleni_po_artiklech', label: 'Přidělení po artiklech' },
  ];
  const RZ_IMPORT_TABS = ['odprodej', 'teo_stavy', 'vyskladnovaci_listy', 'prideleni_po_artiklech'];
  const RZ_ARTIKLY_ROWS = 20;

  const RZ = {
    container: null,
    app: null,
    user: null,
    activeTab: 'artikly',
    artikly: [],
    stores: [],
    settings: {},
    importData: {},
    importOverview: null,

    init(container, app, user) {
      this.container = container;
      this.app = app;
      this.user = user;
      this.render();
      this.loadAll();
    },

    get canWrite() {
      return this.user.role === 'SUPERADMIN' || this.user.permission === 'EDITOR';
    },

    loadAll() {
      Ui.call('apiRzGetSettings', null, { silent: true })
        .then((s) => { this.settings = s || {}; })
        .catch((e) => Ui.toast(e.message, 'error'));
      Ui.call('apiRzListArtikly', null, { silent: true })
        .then((rows) => { this.artikly = rows; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
      Ui.call('apiRzListStores', null, { silent: true })
        .then((rows) => { this.stores = rows; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
      this.loadImportOverview();
    },

    loadImportOverview() {
      return Ui.call('apiRzGetImportOverview', null, { silent: true })
        .then((overview) => { this.importOverview = overview; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    render() {
      this.container.style.padding = '0';

      const settingsBtnWrap = document.querySelector('.subapp-topbar-right');
      if (settingsBtnWrap && !settingsBtnWrap.querySelector('#rzSettingsBtn')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin',
          '<button class="button button-secondary button-small" type="button" id="rzSettingsBtn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-settings"></use></svg>Nastavení</button>');
        document.querySelector('#rzSettingsBtn').addEventListener('click', () => this.openSettings());
      }

      this.container.innerHTML =
        '<div class="section-body" id="rzTabContent"></div>' +
        '<nav class="rz-tabbar">' +
        RZ_TABS.map((t) => '<button class="rz-tabbtn' + (t.key === this.activeTab ? ' is-active' : '') +
          '" type="button" data-tab="' + t.key + '">' + Ui.escape(t.label) + '</button>').join('') +
        '</nav>' +
        '<dialog class="modal modal-large" id="rzSettingsModal">' +
        '  <form id="rzSettingsForm">' +
        '    <header class="modal-header">' +
        '      <span class="modal-icon"><svg><use href="#i-settings"></use></svg></span>' +
        '      <div class="modal-header-text"><p class="kicker">Rozdělovník 20 artiklů</p><h2>Nastavení</h2></div>' +
        '      <button class="modal-close" type="button" id="rzCloseSettingsBtn" aria-label="Zavřít"><svg><use href="#i-close"></use></svg></button>' +
        '    </header>' +
        '    <div class="modal-body">' +
        '      <div class="rz-modal-tabs">' +
        '        <button class="rz-modal-tabbtn is-active" type="button" data-settings-tab="soubory">Zdrojové soubory</button>' +
        '        <button class="rz-modal-tabbtn" type="button" data-settings-tab="informace">Informace o artiklech</button>' +
        '      </div>' +
        '      <div class="rz-settings-panel" data-settings-panel="soubory">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka se zdrojovými soubory (URL nebo ID)</span><input name="syncFolderUrl" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <label><span>Soubor Odprodej — výraz v názvu</span><input name="patternOdprodej" type="text" placeholder="např. odprodej"></label>' +
        '          <label><span>Soubor Teoretické stavy — výraz v názvu</span><input name="patternTeoStavy" type="text" placeholder="např. teo_stavy"></label>' +
        '          <label><span>Soubor Vyskladňovací listy — výraz v názvu</span><input name="patternVyskladnovaciListy" type="text" placeholder="např. vyskladnovaci"></label>' +
        '          <label><span>Soubor Přidělení po artiklech — výraz v názvu</span><input name="patternPrideleniPoArtiklech" type="text" placeholder="např. prideleni"></label>' +
        '          <p class="form-hint">Přehled nalezených souborů je na záložce Artikly.</p>' +
        '        </div>' +
        '      </div>' +
        '      <div class="rz-settings-panel is-hidden" data-settings-panel="informace">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka s informacemi o artiklech (URL nebo ID)</span><input name="folderInformaceOArtiklech" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <label><span>Výraz v názvu souboru</span><input name="patternInformaceOArtiklech" type="text" placeholder="např. informace_o_artiklech"></label>' +
        '          <p class="form-hint">Hledá se soubor, jehož název obsahuje zadaný výraz a zároveň číslo výchozího LC.</p>' +
        '        </div>' +
        '      </div>' +
        '    </div>' +
        '    <footer class="modal-actions">' +
        '      <button class="button button-secondary" type="button" id="rzCancelSettingsBtn"><svg><use href="#i-close"></use></svg>Zrušit</button>' +
        '      <button class="button button-primary" type="submit"><svg><use href="#i-check"></use></svg>Uložit</button>' +
        '    </footer>' +
        '  </form>' +
        '</dialog>';

      this.container.querySelectorAll('.rz-tabbtn').forEach((btn) => {
        btn.addEventListener('click', () => this.showTab(btn.dataset.tab));
      });
      this.container.querySelector('#rzCloseSettingsBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSettingsModal')));
      this.container.querySelector('#rzCancelSettingsBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSettingsModal')));
      this.container.querySelector('#rzSettingsForm').addEventListener('submit', (e) => { e.preventDefault(); this.saveSettings(e.target); });
      this.container.querySelectorAll('.rz-modal-tabbtn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.settingsTab;
          this.container.querySelectorAll('.rz-modal-tabbtn').forEach((b) => b.classList.toggle('is-active', b === btn));
          this.container.querySelectorAll('.rz-settings-panel').forEach((p) => p.classList.toggle('is-hidden', p.dataset.settingsPanel !== key));
        });
      });

      this.renderTabContent();
      this.fitHeight();
      if (!this._resizeBound) {
        this._resizeBound = true;
        window.addEventListener('resize', () => this.fitHeight());
      }
    },

    /** Zajistí, že se scrolluje jen seznam Filiálek — zbytek plochy má napevno vypočtenou výšku bez vlastního scrollu. */
    fitHeight() {
      const topbar = document.querySelector('.subapp-topbar');
      const tabbar = this.container.querySelector('.rz-tabbar');
      const footer = document.querySelector('.statusbar');
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      const used = (topbar ? topbar.offsetHeight : 0) + (tabbar ? tabbar.offsetHeight : 0) + (footer ? footer.offsetHeight : 0);
      el.style.height = Math.max(200, window.innerHeight - used) + 'px';
    },

    showTab(key) {
      this.activeTab = key;
      this.container.querySelectorAll('.rz-tabbtn').forEach((b) => b.classList.toggle('is-active', b.dataset.tab === key));
      this.renderTabContent();
    },

    renderTabContent() {
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      if (this.activeTab === 'artikly') return this.renderArtikly(el);
      if (this.activeTab === 'rozdeleni') return this.renderRozdeleniPlaceholder(el);
      if (RZ_IMPORT_TABS.indexOf(this.activeTab) !== -1) {
        this.renderImportTab(el, this.activeTab);
        if (!this.importData[this.activeTab]) this.loadImportTable(this.activeTab);
      }
    },

    renderArtikly(el) {
      const rows = [];
      for (let i = 0; i < RZ_ARTIKLY_ROWS; i++) rows.push(this.artikly[i] || { poradi: i + 1 });
      const dis = this.canWrite ? '' : 'disabled';

      el.innerHTML =
        '<div class="rz-layout">' +
        '<section class="panel rz-compact rz-artikly-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>Artikly</h2></div>' +
        (this.canWrite ? '<button class="button button-secondary button-small" type="button" id="rzResetArtiklyBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg>Resetovat tabulku</button>' : '') +
        '</div>' +
        '  <div class="table-wrap rz-no-scroll"><table class="rz-artikly-table"><thead><tr><th>Artikl</th><th>Název</th><th>Obsah</th><th>K rozdělení</th><th>Počet dnů</th><th>Metropol</th></tr></thead><tbody>' +
        rows.map((r, i) =>
          '<tr>' +
          '<td><input type="text" data-i="' + i + '" data-f="cislo_artiklu" value="' + Ui.escape(r.cislo_artiklu || '') + '" ' + dis + '></td>' +
          '<td><input type="text" data-i="' + i + '" data-f="nazev" value="' + Ui.escape(r.nazev || '') + '" ' + dis + '></td>' +
          '<td><input type="text" data-i="' + i + '" data-f="obsah" value="' + Ui.escape(r.obsah || '') + '" ' + dis + '></td>' +
          '<td><input type="number" data-i="' + i + '" data-f="k_rozdeleni" value="' + (r.k_rozdeleni != null ? r.k_rozdeleni : '') + '" ' + dis + '></td>' +
          '<td><input type="number" data-i="' + i + '" data-f="pocet_dni" value="' + (r.pocet_dni != null ? r.pocet_dni : '') + '" ' + dis + '></td>' +
          '<td style="text-align:center"><input type="checkbox" data-i="' + i + '" data-f="metropol" ' + (r.metropol ? 'checked' : '') + ' ' + dis + '></td>' +
          '</tr>').join('') +
        '  </tbody></table></div>' +
        '</section>' +
        this.renderImportOverviewPanel() +
        '<section class="panel rz-compact rz-stores-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>Filiálky</h2></div></div>' +
        '  <div class="table-wrap"><table class="rz-stores-table"><thead><tr><th>Prodejna</th><th>Název</th><th>Metropol</th></tr></thead><tbody>' +
        (this.stores.length
          ? this.stores.map((s) => '<tr><td>' + Ui.escape(s.code) + '</td><td>' + Ui.escape(s.name) + '</td><td style="text-align:center">' +
              (s.metropolitni ? '<svg width="14" height="14"><use href="#i-check"></use></svg>' : '—') + '</td></tr>').join('')
          : '<tr><td colspan="3">Načítám…</td></tr>') +
        '  </tbody></table></div>' +
        '</section>' +
        '</div>';

      if (this.canWrite) {
        el.querySelectorAll('.rz-artikly-table input[data-f="cislo_artiklu"]').forEach((input) => {
          input.addEventListener('blur', () => this.lookupArtikl(Number(input.dataset.i)));
        });
        el.querySelectorAll('.rz-artikly-table input:not([data-f="cislo_artiklu"])').forEach((input) => {
          input.addEventListener(input.type === 'checkbox' ? 'change' : 'blur', () => this.saveArtikly());
        });
        el.querySelector('#rzResetArtiklyBtn').addEventListener('click', () => this.resetArtikly());
        const importBtn = el.querySelector('#rzImportAllBtn');
        if (importBtn) importBtn.addEventListener('click', () => this.importAll());
      }
    },

    /** Přehled importu — mezi tabulkami Artikly a Filiálky: co je ve složce a co se z toho podle nastavení najde, plus jedno tlačítko pro import všeho najednou. */
    renderImportOverviewPanel() {
      const overview = this.importOverview;
      return (
        '<section class="panel rz-compact rz-import-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>Import dat</h2></div>' +
        (this.canWrite ? '<button class="button button-primary button-small" type="button" id="rzImportAllBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-refresh"></use></svg>Importovat</button>' : '') +
        '  </div>' +
        '  <div class="panel-body">' +
        (!overview
          ? '<p class="form-hint">Načítám…</p>'
          : (
            '<p class="form-hint">Složka: ' + (overview.folderName ? Ui.escape(overview.folderName) : 'nenastavena — viz Nastavení') + '</p>' +
            '<ul class="rz-import-overview-list">' +
            overview.items.map((item) => (
              '<li class="' + (item.found ? 'is-found' : 'is-missing') + '">' +
              '<strong>' + Ui.escape(item.label) + '</strong>' +
              '<span>' + (item.found
                ? '✓ ' + Ui.escape(item.fileName) + ' <small>(' + Ui.formatDateTime(item.updatedAt) + ')</small>'
                : '✗ Nenalezeno') +
              '</span>' +
              '</li>'
            )).join('') +
            '</ul>'
          )) +
        '  </div>' +
        '</section>'
      );
    },

    importAll() {
      Ui.call('apiRzImportAll', null, { silent: true, busy: 'Importuji soubory…' })
        .then((results) => {
          const okCount = results.filter((r) => r.ok).length;
          const failed = results.filter((r) => !r.ok);
          Ui.toast('Naimportováno ' + okCount + '/' + results.length + ' souborů.' +
            (failed.length ? ' Nenaimportováno: ' + failed.map((r) => r.label + ' (' + r.message + ')').join(', ') : ''),
            failed.length ? 'error' : undefined);
          this.importData = {};
          return this.loadImportOverview();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    resetArtikly() {
      Ui.confirm({
        kicker: 'Artikly',
        title: 'Resetovat tabulku artiklů?',
        message: 'Smaže se všech 20 řádků (čísla artiklů, názvy, obsah, množství i příznak Metropol). Tuto akci nelze vrátit.',
        confirmLabel: 'Resetovat',
      }).then((confirmed) => {
        if (!confirmed) return;
        const el = this.container.querySelector('#rzTabContent');
        el.querySelectorAll('.rz-artikly-table input[type="text"], .rz-artikly-table input[type="number"]').forEach((input) => { input.value = ''; });
        el.querySelectorAll('.rz-artikly-table input[type="checkbox"]').forEach((input) => { input.checked = false; });
        this.saveArtikly();
        Ui.toast('Tabulka artiklů byla resetována.');
      });
    },

    /**
     * Podle čísla artiklu (blur na sloupci Artikl) dotáhne Název a Obsah ze
     * souboru Informace o artiklech — na pozadí, beze zablokování plochy.
     * Uloží se rovnou i bez nalezené shody (uživatel mohl zadat i ručně).
     */
    lookupArtikl(rowIndex) {
      const el = this.container.querySelector('#rzTabContent');
      const cislo = el.querySelector('[data-i="' + rowIndex + '"][data-f="cislo_artiklu"]').value.trim();
      this.saveArtikly();
      if (!cislo) return;

      const nazevInput = el.querySelector('[data-i="' + rowIndex + '"][data-f="nazev"]');
      const obsahInput = el.querySelector('[data-i="' + rowIndex + '"][data-f="obsah"]');
      [nazevInput, obsahInput].forEach((input) => { input.classList.add('is-loading'); input.placeholder = 'Vyhledávám…'; });
      const clearLoading = () => {
        [nazevInput, obsahInput].forEach((input) => { input.classList.remove('is-loading'); input.placeholder = ''; });
      };

      Ui.call('apiRzLookupArtikl', cislo, { silent: true })
        .then((info) => {
          clearLoading();
          if (!info) return;
          // Mezitím mohl uživatel řádek smazat/přepsat - zapiš jen pokud číslo pořád sedí.
          const cisloInput = el.querySelector('[data-i="' + rowIndex + '"][data-f="cislo_artiklu"]');
          if (!cisloInput || cisloInput.value.trim() !== cislo) return;
          nazevInput.value = info.nazev || '';
          obsahInput.value = info.obsah || '';
          this.saveArtikly();
        })
        .catch((e) => { clearLoading(); Ui.toast(e.message, 'error'); });
    },

    saveArtikly() {
      const el = this.container.querySelector('#rzTabContent');
      const rows = [];
      for (let i = 0; i < RZ_ARTIKLY_ROWS; i++) {
        const get = (f) => el.querySelector('[data-i="' + i + '"][data-f="' + f + '"]');
        rows.push({
          cislo_artiklu: get('cislo_artiklu').value.trim(),
          nazev: get('nazev').value.trim(),
          obsah: get('obsah').value.trim(),
          k_rozdeleni: get('k_rozdeleni').value,
          pocet_dni: get('pocet_dni').value,
          metropol: get('metropol').checked,
        });
      }
      Ui.call('apiRzSaveArtikly', rows, { silent: true })
        .then((saved) => { this.artikly = saved; })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    renderRozdeleniPlaceholder(el) {
      el.innerHTML = '<section class="panel"><div class="panel-body"><p class="form-hint">Záložka Rozdělení bude doplněna — logika výpočtu se domlouvá samostatně.</p></div></section>';
    },

    renderImportTab(el, key) {
      const data = this.importData[key];
      const hasData = data && data.headers && data.headers.length;
      const label = (RZ_TABS.find((t) => t.key === key) || {}).label || '';
      el.innerHTML =
        '<section class="panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>' + Ui.escape(label) + '</h2></div></div>' +
        '  <div class="table-wrap"><table>' +
        (hasData ? this.renderImportGrid(data) : '<tbody><tr><td>' + (data ? 'Zatím nic nenaimportováno — použij Importovat na záložce Artikly.' : 'Načítám…') + '</td></tr></tbody>') +
        '  </table></div>' +
        (hasData && this.canWrite ? '  <div class="form-actions"><button class="button button-secondary button-small" type="button" id="rzSaveImportBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-check"></use></svg>Uložit úpravy</button></div>' : '') +
        '</section>';

      if (this.canWrite) {
        const saveBtn = el.querySelector('#rzSaveImportBtn');
        if (saveBtn) saveBtn.addEventListener('click', () => this.saveImportTable(key));
      }
    },

    renderImportGrid(data) {
      return '<thead><tr>' + data.headers.map((h) => '<th>' + Ui.escape(h) + '</th>').join('') + '</tr></thead>' +
        '<tbody>' + data.rows.map((row, ri) =>
          '<tr>' + row.map((cell, ci) => '<td><input data-r="' + ri + '" data-c="' + ci + '" value="' + Ui.escape(cell) + '"></td>').join('') + '</tr>'
        ).join('') + '</tbody>';
    },

    loadImportTable(key) {
      return Ui.call('apiRzGetImportTable', key, { silent: true })
        .then((data) => { this.importData[key] = data; if (this.activeTab === key) this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    saveImportTable(key) {
      const table = this.container.querySelector('#rzTabContent table');
      const data = this.importData[key];
      const rows = data.rows.map((row, ri) => row.map((_, ci) => table.querySelector('[data-r="' + ri + '"][data-c="' + ci + '"]').value));
      Ui.call('apiRzSaveImportTable', { fileKey: key, headers: data.headers, rows: rows }, { silent: true, busy: 'Ukládám…' })
        .then(() => { this.importData[key] = { headers: data.headers, rows: rows }; Ui.toast('Uloženo.'); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    openSettings() {
      Ui.call('apiRzGetSettings', null, { silent: true, busy: 'Načítám nastavení…' })
        .then((s) => {
          this.settings = s || {};
          const f = this.container.querySelector('#rzSettingsForm');
          f.elements.syncFolderUrl.value = this.settings.syncFolderUrl || '';
          f.elements.patternOdprodej.value = this.settings.patternOdprodej || '';
          f.elements.patternTeoStavy.value = this.settings.patternTeoStavy || '';
          f.elements.patternVyskladnovaciListy.value = this.settings.patternVyskladnovaciListy || '';
          f.elements.patternPrideleniPoArtiklech.value = this.settings.patternPrideleniPoArtiklech || '';
          f.elements.folderInformaceOArtiklech.value = this.settings.folderInformaceOArtiklech || '';
          f.elements.patternInformaceOArtiklech.value = this.settings.patternInformaceOArtiklech || '';
          Ui.openModal(this.container.querySelector('#rzSettingsModal'));
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    saveSettings(form) {
      const payload = {
        syncFolderUrl: form.elements.syncFolderUrl.value.trim(),
        patternOdprodej: form.elements.patternOdprodej.value.trim(),
        patternTeoStavy: form.elements.patternTeoStavy.value.trim(),
        patternVyskladnovaciListy: form.elements.patternVyskladnovaciListy.value.trim(),
        patternPrideleniPoArtiklech: form.elements.patternPrideleniPoArtiklech.value.trim(),
        folderInformaceOArtiklech: form.elements.folderInformaceOArtiklech.value.trim(),
        patternInformaceOArtiklech: form.elements.patternInformaceOArtiklech.value.trim(),
      };
      Ui.closeModal(this.container.querySelector('#rzSettingsModal'));
      Ui.call('apiRzSaveSettings', payload, { silent: true, busy: 'Ukládám nastavení…' })
        .then((s) => { this.settings = s; Ui.toast('Nastavení uloženo.'); return this.loadImportOverview(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },
  };

  SUBAPP_VIEWS['rozdelovnik-20-artiklu'] = (container, app, user) => RZ.init(container, app, user);
})();
</script>
