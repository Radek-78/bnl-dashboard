<script>
(function () {
  const RZ_TABS = [
    { key: 'artikly', label: 'Artikly' },
    { key: 'rozdeleni', label: 'Rozdělení' },
    { key: 'odprodej', label: 'Odprodej' },
    { key: 'teo_stavy', label: 'Teo. stavy' },
    { key: 'vyskladnovaci_listy', label: 'Vyskladňovací listy' },
    { key: 'prideleni_po_artiklech', label: 'Přidělení po artiklech' },
  ];
  const RZ_IMPORT_TABS = ['odprodej', 'teo_stavy', 'vyskladnovaci_listy', 'prideleni_po_artiklech'];
  const RZ_ARTIKLY_ROWS = 20;
  const RZ_ROW_H = 25; // odpovídá výšce řádku v rz-compact (input 22px + padding + sdílený border)

  const RZ = {
    container: null,
    app: null,
    user: null,
    activeTab: 'artikly',
    artikly: [],
    stores: [],
    settings: {},
    importData: {},
    importOverview: null,
    rozdeleni: null,
    _artiklyDirty: false,
    _artiklySaveReqId: 0,
    _rozdeleniReqId: 0,
    _queue: [],
    _queueBusy: false,
    _sfState: {},
    _sfViewCache: {},
    _colWidths: {},
    _sfMenu: null,
    _colMenuOutside: null,

    init(container, app, user) {
      this.container = container;
      this.app = app;
      this.user = user;
      this.render();
      this.loadAll();
    },

    get canWrite() {
      return this.user.role === 'SUPERADMIN' || this.user.permission === 'EDITOR';
    },

    loadAll() {
      Ui.call('apiRzGetSettings', null, { silent: true })
        .then((s) => { this.settings = s || {}; })
        .catch((e) => Ui.toast(e.message, 'error'));
      Ui.call('apiRzListArtikly', null, { silent: true })
        .then((rows) => {
          // Tento počáteční GET běží souběžně se 7 dalšími voláními při startu appky
          // a může dorazit až PO tom, co uživatel stihl něco vyplnit a uložit (saveArtikly
          // je rychlejší, protože nesoutěží tak o frontu). Kdyby se aplikovala, přepsala
          // by čerstvě uložená data starým stavem - proto se po prvním uložení ignoruje.
          if (this._artiklyDirty) return;
          this.artikly = rows;
          if (this.activeTab === 'artikly' || this.activeTab === 'rozdeleni') this.renderTabContent();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
      Ui.call('apiRzListStores', null, { silent: true })
        .then((rows) => { this.stores = rows; if (this.activeTab === 'artikly' || this.activeTab === 'rozdeleni') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
      this.loadImportOverview();
      this.loadRozdeleni();
      // Data importovaných souborů se natáhnou rovnou po startu, ne až po
      // kliknutí na záložku - u větších souborů by pak čekání bylo znát.
      RZ_IMPORT_TABS.forEach((key) => this.loadImportTable(key));
    },

    /**
     * Volá se jak při startu appky, tak po každém uložení Úpravy/min/max -
     * dvě takové volání mohou dorazit v jiném pořadí, než byla vyslána (např.
     * počáteční GET dorazí až po pozdějším save-refresh). Číslo požadavku
     * zaručí, že se aplikuje vždy jen výsledek TOHO NEJNOVĚJI vyslaného volání.
     */
    loadRozdeleni() {
      const reqId = ++this._rozdeleniReqId;
      return Ui.call('apiRzGetRozdeleni', null, { silent: true })
        .then((rows) => {
          if (reqId !== this._rozdeleniReqId) return;
          this.rozdeleni = rows;
          if (this.activeTab === 'rozdeleni') this.renderTabContent();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /**
     * Zápisové požadavky (uložení Artiklů, Rozdělení) jdou přes tuhle frontu
     * místo přímého google.script.run - více souběžných zápisů (rychlé
     * zadání víc artiklů za sebou, každý spouští vlastní uložení) na serveru
     * soutěží o stejný zámek tabulky (LockService), a při delší frontě
     * čekání snadno překročí časový limit ("Vypršel časový limit zámku").
     * Fronta zaručí, že server v jednu chvíli zpracovává vždy jen jeden
     * takový požadavek, ostatní čekají na řadu.
     */
    _enqueue(label, taskFn) {
      return new Promise((resolve, reject) => {
        this._queue.push({ label: label, taskFn: taskFn, resolve: resolve, reject: reject });
        this._updateQueueIndicator();
        this._drainQueue();
      });
    },

    _drainQueue() {
      if (this._queueBusy || !this._queue.length) return;
      this._queueBusy = true;
      const job = this._queue.shift();
      this._updateQueueIndicator();
      Promise.resolve()
        .then(job.taskFn)
        .then((result) => job.resolve(result))
        .catch((err) => job.reject(err))
        .then(() => {
          this._queueBusy = false;
          this._updateQueueIndicator();
          this._drainQueue();
        });
    },

    _updateQueueIndicator() {
      const el = document.querySelector('#rzQueueIndicator');
      if (!el) return;
      const waiting = this._queue.length;
      const total = waiting + (this._queueBusy ? 1 : 0);
      if (!total) {
        el.classList.add('is-hidden');
        el.textContent = '';
        return;
      }
      el.classList.remove('is-hidden');
      el.textContent = 'Ukládám…' + (waiting ? ' (' + waiting + ' čeká)' : '');
    },

    loadImportOverview() {
      return Ui.call('apiRzGetImportOverview', null, { silent: true })
        .then((overview) => { this.importOverview = overview; if (this.activeTab === 'artikly') this.renderTabContent(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    render() {
      this.container.style.padding = '0';

      const settingsBtnWrap = document.querySelector('.subapp-topbar-right');
      if (settingsBtnWrap && !settingsBtnWrap.querySelector('#rzSettingsBtn')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin',
          '<button class="button button-secondary button-small" type="button" id="rzSettingsBtn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-settings"></use></svg>Nastavení</button>');
        document.querySelector('#rzSettingsBtn').addEventListener('click', () => this.openSettings());
      }
      if (settingsBtnWrap && !settingsBtnWrap.querySelector('#rzQueueIndicator')) {
        settingsBtnWrap.insertAdjacentHTML('afterbegin', '<span class="rz-queue-indicator is-hidden" id="rzQueueIndicator"></span>');
      }

      this.container.innerHTML =
        '<div class="section-body" id="rzTabContent"></div>' +
        '<nav class="rz-tabbar">' +
        RZ_TABS.map((t) => '<button class="rz-tabbtn' + (t.key === this.activeTab ? ' is-active' : '') +
          '" type="button" data-tab="' + t.key + '">' + Ui.escape(t.label) + '</button>').join('') +
        '</nav>' +
        '<dialog class="modal modal-large" id="rzSettingsModal">' +
        '  <form id="rzSettingsForm">' +
        '    <header class="modal-header">' +
        '      <span class="modal-icon"><svg><use href="#i-settings"></use></svg></span>' +
        '      <div class="modal-header-text"><p class="kicker">Rozdělovník 20 artiklů</p><h2>Nastavení</h2></div>' +
        '      <button class="modal-close" type="button" id="rzCloseSettingsBtn" aria-label="Zavřít"><svg><use href="#i-close"></use></svg></button>' +
        '    </header>' +
        '    <div class="modal-body">' +
        '      <div class="rz-modal-tabs">' +
        '        <button class="rz-modal-tabbtn is-active" type="button" data-settings-tab="soubory">Zdrojové soubory</button>' +
        '        <button class="rz-modal-tabbtn" type="button" data-settings-tab="informace">Informace o artiklech</button>' +
        '      </div>' +
        '      <div class="rz-settings-panel" data-settings-panel="soubory">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka se zdrojovými soubory (URL nebo ID)</span><input name="syncFolderUrl" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <label><span>Soubor Odprodej — výraz v názvu</span><input name="patternOdprodej" type="text" placeholder="např. odprodej"></label>' +
        '          <label><span>Soubor Teoretické stavy — výraz v názvu</span><input name="patternTeoStavy" type="text" placeholder="např. teo_stavy"></label>' +
        '          <label><span>Soubor Vyskladňovací listy — výraz v názvu</span><input name="patternVyskladnovaciListy" type="text" placeholder="např. vyskladnovaci"></label>' +
        '          <label><span>Soubor Přidělení po artiklech — výraz v názvu</span><input name="patternPrideleniPoArtiklech" type="text" placeholder="např. prideleni"></label>' +
        '          <p class="form-hint">Přehled nalezených souborů je na záložce Artikly.</p>' +
        '        </div>' +
        '      </div>' +
        '      <div class="rz-settings-panel is-hidden" data-settings-panel="informace">' +
        '        <div class="form form-plain">' +
        '          <label><span>Složka s informacemi o artiklech (URL nebo ID)</span><input name="folderInformaceOArtiklech" type="text" placeholder="https://drive.google.com/drive/folders/..."></label>' +
        '          <label><span>Výraz v názvu souboru</span><input name="patternInformaceOArtiklech" type="text" placeholder="např. informace_o_artiklech"></label>' +
        '          <p class="form-hint">Hledá se soubor, jehož název obsahuje zadaný výraz a zároveň číslo výchozího LC.</p>' +
        '        </div>' +
        '      </div>' +
        '    </div>' +
        '    <footer class="modal-actions">' +
        '      <button class="button button-secondary" type="button" id="rzCancelSettingsBtn"><svg><use href="#i-close"></use></svg>Zrušit</button>' +
        '      <button class="button button-primary" type="submit"><svg><use href="#i-check"></use></svg>Uložit</button>' +
        '    </footer>' +
        '  </form>' +
        '</dialog>';

      this.container.querySelectorAll('.rz-tabbtn').forEach((btn) => {
        btn.addEventListener('click', () => this.showTab(btn.dataset.tab));
      });
      this.container.querySelector('#rzCloseSettingsBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSettingsModal')));
      this.container.querySelector('#rzCancelSettingsBtn').addEventListener('click', () => Ui.closeModal(this.container.querySelector('#rzSettingsModal')));
      this.container.querySelector('#rzSettingsForm').addEventListener('submit', (e) => { e.preventDefault(); this.saveSettings(e.target); });
      this.container.querySelectorAll('.rz-modal-tabbtn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.settingsTab;
          this.container.querySelectorAll('.rz-modal-tabbtn').forEach((b) => b.classList.toggle('is-active', b === btn));
          this.container.querySelectorAll('.rz-settings-panel').forEach((p) => p.classList.toggle('is-hidden', p.dataset.settingsPanel !== key));
        });
      });

      this.renderTabContent();
      this.fitHeight();
      if (!this._resizeBound) {
        this._resizeBound = true;
        window.addEventListener('resize', () => this.fitHeight());
      }
    },

    /** Zajistí, že se scrolluje jen seznam Filiálek — zbytek plochy má napevno vypočtenou výšku bez vlastního scrollu. */
    fitHeight() {
      const topbar = document.querySelector('.subapp-topbar');
      const tabbar = this.container.querySelector('.rz-tabbar');
      const footer = document.querySelector('.statusbar');
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      const used = (topbar ? topbar.offsetHeight : 0) + (tabbar ? tabbar.offsetHeight : 0) + (footer ? footer.offsetHeight : 0);
      el.style.height = Math.max(200, window.innerHeight - used) + 'px';
    },

    showTab(key) {
      this.activeTab = key;
      this.container.querySelectorAll('.rz-tabbtn').forEach((b) => b.classList.toggle('is-active', b.dataset.tab === key));
      this.renderTabContent();
    },

    renderTabContent() {
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      if (this.activeTab === 'artikly') return this.renderArtikly(el);
      if (this.activeTab === 'rozdeleni') return this.renderRozdeleni(el);
      if (RZ_IMPORT_TABS.indexOf(this.activeTab) !== -1) {
        this.renderImportTab(el, this.activeTab);
        if (!this.importData[this.activeTab]) this.loadImportTable(this.activeTab);
      }
    },

    renderArtikly(el) {
      const rows = [];
      for (let i = 0; i < RZ_ARTIKLY_ROWS; i++) rows.push(this.artikly[i] || { poradi: i + 1 });
      const dis = this.canWrite ? '' : 'disabled';

      el.innerHTML =
        '<div class="rz-layout">' +
        '<section class="panel rz-compact rz-artikly-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>Artikly</h2></div>' +
        (this.canWrite ? '<button class="button button-secondary button-small" type="button" id="rzResetArtiklyBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg>Resetovat tabulku</button>' : '') +
        '</div>' +
        '  <div class="table-wrap rz-no-scroll"><table class="rz-artikly-table"><thead><tr><th>Artikl</th><th>Název</th><th>Obsah</th><th>K rozdělení</th><th>Počet dnů</th><th>Metropol</th></tr></thead><tbody>' +
        rows.map((r, i) =>
          '<tr>' +
          '<td><input type="text" data-i="' + i + '" data-f="cislo_artiklu" value="' + Ui.escape(r.cislo_artiklu || '') + '" ' + dis + '></td>' +
          '<td><input type="text" data-i="' + i + '" data-f="nazev" value="' + Ui.escape(r.nazev || '') + '" ' + dis + '></td>' +
          '<td><input type="text" data-i="' + i + '" data-f="obsah" value="' + Ui.escape(r.obsah || '') + '" ' + dis + '></td>' +
          '<td><input type="number" data-i="' + i + '" data-f="k_rozdeleni" value="' + (r.k_rozdeleni != null ? r.k_rozdeleni : '') + '" ' + dis + '></td>' +
          '<td><input type="number" data-i="' + i + '" data-f="pocet_dni" value="' + (r.pocet_dni != null ? r.pocet_dni : '') + '" ' + dis + '></td>' +
          '<td style="text-align:center"><input type="checkbox" data-i="' + i + '" data-f="metropol" ' + (r.metropol ? 'checked' : '') + ' ' + dis + '></td>' +
          '</tr>').join('') +
        '  </tbody></table></div>' +
        '</section>' +
        this.renderImportOverviewPanel() +
        '<section class="panel rz-compact rz-stores-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>Filiálky</h2></div></div>' +
        '  <div class="table-wrap"><table class="rz-stores-table"><thead><tr><th>Prodejna</th><th>Název</th><th>Metropol</th></tr></thead><tbody>' +
        (this.stores.length
          ? this.stores.map((s) => '<tr><td>' + Ui.escape(s.code) + '</td><td>' + Ui.escape(s.name) + '</td><td style="text-align:center">' +
              (s.metropolitni ? '<svg width="14" height="14"><use href="#i-check"></use></svg>' : '—') + '</td></tr>').join('')
          : '<tr><td colspan="3">Načítám…</td></tr>') +
        '  </tbody></table></div>' +
        '</section>' +
        '</div>';

      if (this.canWrite) {
        el.querySelectorAll('.rz-artikly-table input[data-f="cislo_artiklu"]').forEach((input) => {
          input.addEventListener('blur', () => this.lookupArtikl(Number(input.dataset.i)));
        });
        el.querySelectorAll('.rz-artikly-table input:not([data-f="cislo_artiklu"])').forEach((input) => {
          input.addEventListener(input.type === 'checkbox' ? 'change' : 'blur', () => this.saveArtikly());
        });
        el.querySelector('#rzResetArtiklyBtn').addEventListener('click', () => this.resetArtikly());
        const importBtn = el.querySelector('#rzImportAllBtn');
        if (importBtn) importBtn.addEventListener('click', () => this.importAll());
        const clearImportsBtn = el.querySelector('#rzClearImportsBtn');
        if (clearImportsBtn) clearImportsBtn.addEventListener('click', () => this.clearImports());
      }
    },

    /**
     * Přehled importu — mezi tabulkami Artikly a Filiálky: co je ve složce a co
     * se z toho podle nastavení najde (nezávisle na tom, jestli to už máme
     * naimportované), plus tlačítka pro import všeho najednou a pro vymazání
     * naimportovaných dat.
     */
    renderImportOverviewPanel() {
      const overview = this.importOverview;
      return (
        '<section class="panel rz-compact rz-import-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>Import dat</h2></div>' +
        (this.canWrite
          ? '<div style="display:flex;gap:6px;">' +
            '<button class="button button-secondary button-small" type="button" id="rzClearImportsBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-trash"></use></svg>Vymazat</button>' +
            '<button class="button button-primary button-small" type="button" id="rzImportAllBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-refresh"></use></svg>Importovat</button>' +
            '</div>'
          : '') +
        '  </div>' +
        '  <div class="panel-body">' +
        (!overview
          ? '<p class="form-hint">Načítám…</p>'
          : (
            '<p class="form-hint">Složka: ' + (overview.folderName ? Ui.escape(overview.folderName) : 'nenastavena — viz Nastavení') + '</p>' +
            '<ul class="rz-import-overview-list">' +
            overview.items.map((item) => (
              '<li>' +
              '<strong>' + Ui.escape(item.label) + '</strong>' +
              '<div class="rz-import-row">' +
              '<span class="' + (item.found ? 'is-found' : 'is-missing') + '">' + (item.found
                ? '✓ ' + Ui.escape(item.fileName) + ' <small>(' + Ui.formatDateTime(item.updatedAt) + ')</small>'
                : '✗ soubor ve složce nenalezen') +
              '</span>' +
              '<span class="' + (item.importedRowCount > 0 ? 'is-found' : 'is-missing') + '">' + (item.importedRowCount > 0 ? 'naimportováno: ' + item.importedRowCount + ' řádků' : 'zatím nenaimportováno') + '</span>' +
              '</div>' +
              '</li>'
            )).join('') +
            '</ul>'
          )) +
        '  </div>' +
        '</section>'
      );
    },

    importAll() {
      Ui.call('apiRzImportAll', null, { silent: true, busy: 'Importuji soubory…' })
        .then((results) => {
          const okCount = results.filter((r) => r.ok).length;
          const failed = results.filter((r) => !r.ok);
          Ui.toast('Naimportováno ' + okCount + '/' + results.length + ' souborů.' +
            (failed.length ? ' Nenaimportováno: ' + failed.map((r) => r.label + ' (' + r.message + ')').join(', ') : ''),
            failed.length ? 'error' : undefined);
          this.importData = {};
          this._sfState = {};
          this._sfViewCache = {};
          this._colWidths = {};
          return this.loadImportOverview();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    clearImports() {
      Ui.confirm({
        kicker: 'Import dat',
        title: 'Vymazat naimportovaná data?',
        message: 'Smaže se obsah všech 4 naimportovaných tabulek (Odprodej, Teoretické stavy, Vyskladňovací listy, Přidělení po artiklech). Zdrojové soubory ve složce ani Artikly se nezmění. Tuto akci nelze vrátit.',
        confirmLabel: 'Vymazat',
      }).then((confirmed) => {
        if (!confirmed) return;
        Ui.call('apiRzClearImports', null, { silent: true, busy: 'Mažu naimportovaná data…' })
          .then(() => {
            this.importData = {};
            this._sfState = {};
            this._sfViewCache = {};
            this._colWidths = {};
            Ui.toast('Naimportovaná data byla vymazána.');
            return this.loadImportOverview();
          })
          .catch((e) => Ui.toast(e.message, 'error'));
      });
    },

    resetArtikly() {
      Ui.confirm({
        kicker: 'Artikly',
        title: 'Resetovat tabulku artiklů?',
        message: 'Smaže se všech 20 řádků (čísla artiklů, názvy, obsah, množství i příznak Metropol) a zároveň i data v záložce Rozdělení (min/max, Úprava po prodejnách) - jinak by po opětovném zadání stejného čísla artiklu zůstala viset stará čísla. Tuto akci nelze vrátit.',
        confirmLabel: 'Resetovat',
      }).then((confirmed) => {
        if (!confirmed) return;
        const el = this.container.querySelector('#rzTabContent');
        el.querySelectorAll('.rz-artikly-table input[type="text"], .rz-artikly-table input[type="number"]').forEach((input) => { input.value = ''; });
        el.querySelectorAll('.rz-artikly-table input[type="checkbox"]').forEach((input) => { input.checked = false; });
        this.saveArtikly();
        this._enqueue('Mažu rozdělení', () => Ui.call('apiRzResetRozdeleni', null, { silent: true }))
          .then(() => this.loadRozdeleni())
          .catch((e) => Ui.toast(e.message, 'error'));
        Ui.toast('Tabulka artiklů byla resetována.');
      });
    },

    /**
     * Podle čísla artiklu (blur na sloupci Artikl) dotáhne Název a Obsah ze
     * souboru Informace o artiklech — na pozadí, beze zablokování plochy.
     * Uloží se rovnou i bez nalezené shody (uživatel mohl zadat i ručně).
     */
    /**
     * Hledání může krátce po sobě selhat (např. dočasná konvertovaná kopie
     * zdrojového souboru se teprve zakládá) - proto se "nenalezeno" nebere
     * hned jako konečný stav, ale zkusí se ještě 3x s rostoucí prodlevou.
     *
     * Průběžný stav ("je pořád aktuální", "kam zapsat výsledek") se řeší přes
     * this.artikly (datový model), NE přes uložené reference na DOM inputy -
     * uživatel může mezi jednotlivými pokusy klidně přepnout na jinou záložku
     * a zase se vrátit; DOM inputy z Artiklů v tu chvíli vůbec neexistují,
     * takže odkaz na ně by hledání tiše zastavil. this.artikly ale existuje
     * pořád, takže výsledek dojde a uloží se, ať je uživatel kdekoliv.
     */
    lookupArtikl(rowIndex) {
      const el = this.container.querySelector('#rzTabContent');
      const cislo = el.querySelector('[data-i="' + rowIndex + '"][data-f="cislo_artiklu"]').value.trim();
      this.saveArtikly();
      if (!cislo) return;

      this._setLookupLoading(rowIndex, true);
      const stillCurrent = () => this.artikly[rowIndex] && this.artikly[rowIndex].cislo_artiklu === cislo;

      const attempt = (retryDelaysMs) => {
        Ui.call('apiRzLookupArtikl', cislo, { silent: true })
          .then((info) => {
            if (!stillCurrent()) { this._setLookupLoading(rowIndex, false); return; }
            if (info && (info.nazev || info.obsah)) {
              this._applyLookupResult(rowIndex, info.nazev || '', info.obsah || '');
              return;
            }
            if (retryDelaysMs.length) {
              setTimeout(() => { if (stillCurrent()) attempt(retryDelaysMs.slice(1)); }, retryDelaysMs[0]);
              return;
            }
            this._applyLookupResult(rowIndex, 'Nenalezeno — zadejte ručně', (this.artikly[rowIndex] || {}).obsah || '');
          })
          .catch((e) => { this._setLookupLoading(rowIndex, false); Ui.toast(e.message, 'error'); });
      };

      attempt([1500, 2500, 4000]);
    },

    /** Zapne/vypne vizuální indikaci vyhledávání na polích Název/Obsah - jen pokud je uživatel právě na záložce Artikly a řádek je vykreslený, jinak na DOM nesahá. */
    _setLookupLoading(rowIndex, isLoading) {
      if (this.activeTab !== 'artikly') return;
      const el = this.container.querySelector('#rzTabContent');
      if (!el) return;
      ['nazev', 'obsah'].forEach((f) => {
        const input = el.querySelector('[data-i="' + rowIndex + '"][data-f="' + f + '"]');
        if (!input) return;
        input.classList.toggle('is-loading', isLoading);
        input.placeholder = isLoading ? 'Vyhledávám…' : '';
      });
    },

    /** Zapíše výsledek vyhledání do this.artikly a uloží na server - funguje i když uživatel mezitím přepnul na jinou záložku. Je-li Artikly zrovna vykreslené, promítne se rovnou i do živých polí. */
    _applyLookupResult(rowIndex, nazev, obsah) {
      if (!this.artikly[rowIndex]) return;
      this.artikly[rowIndex] = Object.assign({}, this.artikly[rowIndex], { nazev: nazev, obsah: obsah });
      this._persistArtikly(this.artikly.slice());
      this._setLookupLoading(rowIndex, false);
      if (this.activeTab === 'artikly') {
        const el = this.container.querySelector('#rzTabContent');
        const nazevInput = el && el.querySelector('[data-i="' + rowIndex + '"][data-f="nazev"]');
        const obsahInput = el && el.querySelector('[data-i="' + rowIndex + '"][data-f="obsah"]');
        if (nazevInput) nazevInput.value = nazev;
        if (obsahInput) obsahInput.value = obsah;
      }
    },

    /**
     * Uloží pole na server a promítne do this.artikly - odděleno od čtení
     * DOM (viz saveArtikly), aby šlo uložit i výsledek vyhledání, které
     * doběhne na pozadí, když už Artikly nejsou vykreslené. Číslo požadavku
     * zaručí, že se do this.artikly nakonec zapíše výsledek jen TOHO
     * NEJNOVĚJI vyslaného uložení, ne to, co náhodou dorazí poslední.
     */
    _persistArtikly(rows) {
      this.artikly = rows;
      this._artiklyDirty = true;
      const reqId = ++this._artiklySaveReqId;
      return this._enqueue('Ukládám artikly', () => Ui.call('apiRzSaveArtikly', rows, { silent: true }))
        .then((saved) => {
          if (reqId !== this._artiklySaveReqId) return;
          this.artikly = saved;
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /**
     * Volá se na blur z každého pole tabulky Artiklů - čte aktuální obsah
     * polí (proto vyžaduje, aby Artikly byly zrovna vykreslené) a uloží přes
     * _persistArtikly, které this.artikly aktualizuje HNED, ne až z odpovědi
     * serveru. Bez toho by přepnutí na jinou záložku a rychlý návrat (dřív,
     * než dorazí odpověď na uložení) zobrazilo ještě staré/prázdné
     * this.artikly, i když v DB už byla čerstvá data uložená.
     */
    saveArtikly() {
      const el = this.container.querySelector('#rzTabContent');
      const rows = [];
      for (let i = 0; i < RZ_ARTIKLY_ROWS; i++) {
        const get = (f) => el.querySelector('[data-i="' + i + '"][data-f="' + f + '"]');
        rows.push({
          poradi: i + 1,
          cislo_artiklu: get('cislo_artiklu').value.trim(),
          nazev: get('nazev').value.trim(),
          obsah: get('obsah').value.trim(),
          k_rozdeleni: get('k_rozdeleni').value,
          pocet_dni: get('pocet_dni').value,
          metropol: get('metropol').checked,
        });
      }
      return this._persistArtikly(rows);
    },

    /**
     * Jeden blok na každý vyplněný artikl z Artiklů, vedle sebe ve vodorovně
     * scrollovatelném pásu. Vlevo je zamrzlý sloupec Prodejna (position:
     * sticky, sdílený pro všechny bloky) - protože je to všechno JEDNA
     * scrollovací oblast (frozen sloupec + bloky jsou sourozenci v jednom
     * flex řádku), svislý scroll je automaticky společný, žádné ruční
     * synchronizování dvou scrollbarů.
     *
     * Zaokrouhlit a přesný výpočet rozdělení zatím nejsou - algoritmus se
     * domlouvá samostatně, tohle je jen kostra bloků/řádků k vyzkoušení.
     */
    renderRozdeleni(el) {
      const artikly = this.artikly.filter((a) => a && a.cislo_artiklu);
      if (!this.stores.length || this.rozdeleni === null || !artikly.length) {
        el.innerHTML = '<section class="panel"><div class="panel-body"><p class="form-hint">' +
          (!artikly.length ? 'Nejsou vyplněné žádné artikly — doplňte je v záložce Artikly.' : 'Načítám…') +
          '</p></div></section>';
        return;
      }

      const { byArtikl, byStore } = this._rozdeleniLookup();
      const dis = this.canWrite ? '' : ' disabled';

      const frozenRows = this.stores.map((s) => '<div class="rzr-hrow rzr-store-cell">' + Ui.escape(s.code) + '</div>').join('');
      const rwToPersist = [];

      const blocks = artikly.map((a) => {
        const cislo = a.cislo_artiklu;
        const minMax = byArtikl[cislo] || {};
        const upravy = byStore[cislo] || {};
        const perStore = this._computeMedianTeo(cislo);
        const target = (a.k_rozdeleni !== '' && a.k_rozdeleni != null) ? Number(a.k_rozdeleni) || 0 : 0;

        // Stav = Teo. stav + Dodáno (Vyskladňovací listy) - zobrazuje se rovnou
        // tahle kombinovaná hodnota, ať tabulka ukazuje totéž, co se počítá.
        // "—" jen když nemáme vůbec žádný z obou zdrojů.
        const stavProVypocet = (s) => {
          const v = perStore[s.code] || {};
          if (v.teo == null && v.dodano == null) return null;
          return (v.teo || 0) + (v.dodano || 0);
        };

        // Chybí-li RW, dopočítá se vodorovným doplňováním (viz _solveRw) a rovnou
        // se uloží, ať je od teď vidět a upravitelné jako běžná hodnota.
        let rw = (minMax.rw !== '' && minMax.rw != null) ? Number(minMax.rw) : null;
        if (rw === null) {
          const storeData = this.stores.map((s) => ({ median: (perStore[s.code] || {}).median || 0, stav: stavProVypocet(s) }));
          rw = this._solveRw(target, storeData, minMax.min, minMax.max);
          rwToPersist.push({ cislo: cislo, rw: rw });
        }

        let rozdeleno = 0;
        const dataRows = this.stores.map((s) => {
          const vals = perStore[s.code] || {};
          const median = vals.median || 0;
          const stav = stavProVypocet(s);
          const prideli = this._clampPrideli(rw, median, stav, minMax.min, minMax.max);
          const uprava = upravy[s.code];
          const efektivni = (uprava != null && uprava !== '') ? (this._toNumber(uprava) || 0) : prideli;
          rozdeleno += efektivni;
          return '<div class="rzr-hrow rzr-data-row">' +
            '<span>' + (vals.median != null ? this._fmtNum(vals.median) : '—') + '</span>' +
            '<span>' + (stav != null ? this._fmtNum(stav) : '—') + '</span>' +
            '<span class="rzr-prideli" data-cislo="' + Ui.escape(cislo) + '" data-store="' + Ui.escape(s.code) + '">' + prideli + '</span>' +
            '<input type="text" inputmode="decimal" data-cislo="' + Ui.escape(cislo) + '" data-store="' + Ui.escape(s.code) + '" value="' + (uprava != null && uprava !== '' ? this._fmtNum(uprava) : '') + '"' + dis + '>' +
            '</div>';
        }).join('');

        return (
          '<div class="rzr-block">' +
          '  <div class="rzr-block-head">' +
          '    <div class="rzr-hrow rzr-artikl-row"><strong>' + Ui.escape(cislo) + '</strong> ' + Ui.escape(a.nazev || '') + '</div>' +
          '    <div class="rzr-hrow rzr-kv-row"><span>k rozdělení</span><b>' + (target || '—') + '</b></div>' +
          '    <div class="rzr-hrow rzr-kv-row"><span>rozděleno</span><b class="rzr-rozdeleno" data-cislo="' + Ui.escape(cislo) + '">' + rozdeleno + '</b></div>' +
          '    <div class="rzr-hrow rzr-kv-row"><span>zaokrouhlit</span><b>—</b></div>' +
          '    <div class="rzr-hrow rzr-kv-row"><span>min</span><input type="text" inputmode="decimal" class="rzr-minmax" data-cislo="' + Ui.escape(cislo) + '" data-field="min" value="' + (minMax.min != null && minMax.min !== '' ? this._fmtNum(minMax.min) : '') + '"' + dis + '></div>' +
          '    <div class="rzr-hrow rzr-kv-row"><span>max</span><input type="text" inputmode="decimal" class="rzr-minmax" data-cislo="' + Ui.escape(cislo) + '" data-field="max" value="' + (minMax.max != null && minMax.max !== '' ? this._fmtNum(minMax.max) : '') + '"' + dis + '></div>' +
          '    <div class="rzr-hrow rzr-kv-row"><span>RW</span><input type="number" step="0.1" class="rzr-rw" data-cislo="' + Ui.escape(cislo) + '" value="' + rw + '"' + dis + '>' +
          (this.canWrite ? '<button class="rzr-rw-recalc" type="button" data-cislo="' + Ui.escape(cislo) + '" title="Přepočítat RW podle aktuálního vzorce">⟲</button>' : '') +
          '</div>' +
          '    <div class="rzr-hrow rzr-cols-row"><span>MEDIAN</span><span>Teo. stav</span><span>Příděl</span><span>Úprava</span></div>' +
          '  </div>' +
          '  <div class="rzr-block-body">' + dataRows + '</div>' +
          '</div>'
        );
      }).join('');

      el.innerHTML =
        '<div class="rzr-scroll rz-compact">' +
        '  <div class="rzr-frozen">' +
        '    <div class="rzr-frozen-head">' +
        '      <div class="rzr-frozen-spacer"></div>' +
        '      <div class="rzr-hrow rzr-cols-row"><span>Prodejna</span></div>' +
        '    </div>' +
        '    <div class="rzr-frozen-body">' + frozenRows + '</div>' +
        '  </div>' +
        blocks +
        '</div>';

      if (this.canWrite) {
        el.querySelectorAll('.rzr-minmax').forEach((input) => {
          input.addEventListener('input', () => this._recomputeBlockLive(input.dataset.cislo));
          input.addEventListener('blur', () => this.saveRozdeleniMinMax(input.dataset.cislo));
        });
        el.querySelectorAll('.rzr-rw').forEach((input) => {
          // input = při každé změně (psaní i klik na šipky) - okamžitý přepočet Příděl/Rozděleno bez čekání na uložení.
          input.addEventListener('input', () => this._recomputeBlockLive(input.dataset.cislo));
          input.addEventListener('blur', () => this.saveRozdeleniRw(input.dataset.cislo));
        });
        el.querySelectorAll('.rzr-rw-recalc').forEach((btn) => {
          btn.addEventListener('click', () => this.recomputeRw(btn.dataset.cislo));
        });
        el.querySelectorAll('.rzr-data-row input').forEach((input) => {
          input.addEventListener('blur', () => this.saveRozdeleniUprava(input.dataset.cislo, input.dataset.store));
        });
      }

      // Nově dopočítaná RW (viz výše) se rovnou uloží, ať je od dalšího
      // vykreslení už jen "uživatelova" uložená hodnota, ne odhad počítaný pokaždé znovu.
      if (this.canWrite) {
        rwToPersist.forEach(({ cislo, rw }) => {
          this._upsertRozdeleniLocal(cislo, '', { rw: rw });
          this._enqueue('Ukládám RW', () => Ui.call('apiRzSaveRozdeleniRw', { cislo_artiklu: cislo, rw: rw }, { silent: true }))
            .catch((e) => Ui.toast(e.message, 'error'));
        });
      }
    },

    /** { byArtikl: {cislo: {min,max,rw}}, byStore: {cislo: {prodejna: uprava}} } */
    _rozdeleniLookup() {
      const byArtikl = {};
      const byStore = {};
      (this.rozdeleni || []).forEach((r) => {
        if (!r.prodejna) {
          byArtikl[r.cislo_artiklu] = { min: r.min, max: r.max, rw: r.rw };
        } else {
          if (!byStore[r.cislo_artiklu]) byStore[r.cislo_artiklu] = {};
          byStore[r.cislo_artiklu][r.prodejna] = r.uprava;
        }
      });
      return { byArtikl, byStore };
    },

    /** Porovná číslo artiklu z importu s číslem z Artiklů - kromě přesné shody textu i číselně, kdyby se lišilo jen formátováním (např. koncová ".0" po převodu čísla na text). */
    _artiklMatches(cellVal, cislo) {
      const a = String(cellVal).trim();
      const b = String(cislo).trim();
      if (a === b) return true;
      const na = Number(a), nb = Number(b);
      return !isNaN(na) && !isNaN(nb) && na === nb;
    },

    /** Najde index sloupce podle kousku názvu (bez diakritiky) - hlavičky Odprodeje/Teo. stavů odpovídají přesně zdrojovému souboru, proto se nedá spoléhat na pevný název. */
    _findColIndex(headers, candidates) {
      const norm = (s) => String(s).trim().toLowerCase().normalize('NFD').replace(/[^\x00-\x7F]/g, '');
      const normed = headers.map(norm);
      for (const cand of candidates) {
        const idx = normed.findIndex((h) => h.indexOf(cand) !== -1);
        if (idx !== -1) return idx;
      }
      return -1;
    },

    /** Stejné jako _findColIndex, ale hledá jen přesnou shodu názvu - potřeba u Vyskladňovacích listů, kde sloupec "Artikl" obsahuje jiný (delší interní) kód a skutečné číslo artiklu je ve sloupci "Art"; hledání podle podřetězce by se vždy trefilo do "Artikl" prvního. */
    _findColIndexExact(headers, candidates) {
      const norm = (s) => String(s).trim().toLowerCase().normalize('NFD').replace(/[^\x00-\x7F]/g, '');
      const normed = headers.map(norm);
      for (const cand of candidates) {
        const idx = normed.indexOf(cand);
        if (idx !== -1) return idx;
      }
      return -1;
    },

    _median(nums) {
      if (!nums.length) return 0;
      const sorted = nums.slice().sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    },

    _fmtNum(n) {
      return Number(n).toLocaleString('cs-CZ', { maximumFractionDigits: 2 });
    },

    /**
     * MEDIAN = medián "Prodáno v kartonech" z Odprodeje pro daný artikl, po
     * prodejnách. teo = poslední (nejnovější podle data) hodnota teoretického
     * stavu z Teo. stavů, přepočtená na kartony (Stav v ks ÷ Obsah). dodano =
     * součet sloupce "Dodáno" z Vyskladňovacích listů (zboží skutečně
     * doručené na prodejnu, které ještě nemusí být v Teo. stavu promítnuté; je
     * už v kartonech, nepřepočítává se). Zobrazený sloupec "Teo. stav" i
     * výpočet přídělu (_clampPrideli) používají stejnou hodnotu: teo + dodano
     * (viz stavProVypocet v renderRozdeleni). Přidělení po artiklech zatím do
     * stavu nevstupuje - není naimportováno / neznáme jeho sloupce.
     */
    _computeMedianTeo(cisloArtiklu) {
      const result = {};
      const od = this.importData.odprodej;
      if (od && od.headers && od.headers.length) {
        const ciP = this._findColIndex(od.headers, ['prodejna']);
        const ciA = this._findColIndex(od.headers, ['artikl']);
        const ciKart = this._findColIndex(od.headers, ['prodano v kartonech']);
        if (ciP !== -1 && ciA !== -1 && ciKart !== -1) {
          const byStore = {};
          od.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const val = this._toNumber(r[ciKart]);
            if (isNaN(val)) return;
            (byStore[store] = byStore[store] || []).push(val);
          });
          Object.keys(byStore).forEach((store) => {
            result[store] = result[store] || {};
            result[store].median = this._median(byStore[store]);
          });
        }
      }

      const teo = this.importData.teo_stavy;
      if (teo && teo.headers && teo.headers.length) {
        const ciP = this._findColIndex(teo.headers, ['prodejna']);
        const ciA = this._findColIndex(teo.headers, ['artikl']);
        const ciD = this._findColIndex(teo.headers, ['datum']);
        const ciS = this._findColIndex(teo.headers, ['teoreticky stav', 'teor. stav', 'stav']);
        const ciObsah = this._findColIndex(teo.headers, ['obsah']);
        if (ciP !== -1 && ciA !== -1 && ciS !== -1 && ciObsah !== -1) {
          const latest = {};
          teo.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const stavKs = this._toNumber(r[ciS]);
            const obsah = this._toNumber(r[ciObsah]);
            if (isNaN(stavKs) || isNaN(obsah) || !obsah) return;
            const val = stavKs / obsah;
            const dateVal = ciD !== -1 ? (this._parseDate(r[ciD]) || 0) : 0;
            if (!latest[store] || dateVal >= latest[store].dateVal) latest[store] = { val, dateVal };
          });
          Object.keys(latest).forEach((store) => {
            result[store] = result[store] || {};
            result[store].teo = latest[store].val;
          });
        }
      }

      const vysklad = this.importData.vyskladnovaci_listy;
      if (vysklad && vysklad.headers && vysklad.headers.length) {
        const ciP = this._findColIndex(vysklad.headers, ['prodejna']);
        // Pozor: sloupec "Artikl" tu obsahuje jiný (delší interní) kód - skutečné
        // číslo artiklu je ve sloupci "Art", proto přesná shoda, ne podřetězec.
        const ciA = this._findColIndexExact(vysklad.headers, ['art']);
        const ciDod = this._findColIndex(vysklad.headers, ['dodano']);
        if (ciP !== -1 && ciA !== -1 && ciDod !== -1) {
          const soucet = {};
          vysklad.rows.forEach((r) => {
            if (!this._artiklMatches(r[ciA], cisloArtiklu)) return;
            const store = String(r[ciP]).trim();
            const val = this._toNumber(r[ciDod]);
            if (isNaN(val)) return;
            soucet[store] = (soucet[store] || 0) + val;
          });
          Object.keys(soucet).forEach((store) => {
            result[store] = result[store] || {};
            result[store].dodano = soucet[store];
          });
        }
      }

      return result;
    },

    /**
     * Vodorovné doplňování (Reichweite): příděl prodejny = RW × MEDIAN − Stav,
     * zaokrouhleno na celé číslo, ohraničeno min/max (pokud jsou zadané - jinak
     * jen spodní hranice 0, žádný záporný příděl). Stav je zatím jen poslední
     * hodnota z Teo. stavů (vals.teo) - Přidělení po artiklech a Vyskladňovací
     * listy do součtu zatím nevstupují, dokud neznáme jejich sloupce.
     */
    _clampPrideli(rw, median, stav, min, max) {
      let v = Math.round(rw * median - stav);
      const lo = (min !== '' && min != null) ? Number(min) : 0;
      const hi = (max !== '' && max != null) ? Number(max) : Infinity;
      if (v < lo) v = lo;
      if (v > hi) v = hi;
      return v;
    },

    /** Najde RW tak, aby součet přídělů (po ohraničení min/max) byl co nejblíž cílovému množství (k rozdělení) - součet je v RW neklesající, takže stačí půlení intervalu. */
    _solveRw(target, storeData, min, max) {
      const totalFor = (rw) => storeData.reduce((sum, s) => sum + this._clampPrideli(rw, s.median, s.stav, min, max), 0);
      let lo = 0;
      let hi = 60; // rozumný horní strop (dnů zásoby) - i kdyby na cíl nestačil, vrátí se jako nejvyšší rozumná hodnota
      for (let i = 0; i < 40; i++) {
        const mid = (lo + hi) / 2;
        if (totalFor(mid) < target) lo = mid; else hi = mid;
      }
      return Math.round(hi * 100) / 100;
    },

    /** Promítne uloženou hodnotu do this.rozdeleni HNED, ne až po odpovědi serveru - stejný důvod jako u saveArtikly (rychlé přepnutí pryč a zpět by jinak mohlo ukázat ještě needitovaná data). */
    _upsertRozdeleniLocal(cislo, prodejna, patch) {
      if (!this.rozdeleni) this.rozdeleni = [];
      const idx = this.rozdeleni.findIndex((r) => r.cislo_artiklu === cislo && String(r.prodejna || '') === String(prodejna || ''));
      if (idx !== -1) {
        this.rozdeleni[idx] = Object.assign({}, this.rozdeleni[idx], patch);
      } else {
        this.rozdeleni.push(Object.assign({ cislo_artiklu: cislo, prodejna: prodejna || '' }, patch));
      }
    },

    /**
     * "Online" přepočet Příděl/Rozděleno hned při psaní/klikání na šipky RW -
     * bez čekání na uložení na server. Cílené přepisování konkrétních buněk
     * (ne celý překreslení tabulky), ať RW input při tom neztratí fokus.
     */
    _recomputeBlockLive(cislo) {
      const el = this.container.querySelector('#rzTabContent');
      const rwInput = el.querySelector('.rzr-rw[data-cislo="' + CSS.escape(cislo) + '"]');
      const minInput = el.querySelector('.rzr-minmax[data-cislo="' + CSS.escape(cislo) + '"][data-field="min"]');
      const maxInput = el.querySelector('.rzr-minmax[data-cislo="' + CSS.escape(cislo) + '"][data-field="max"]');
      const rw = Number(rwInput.value) || 0;
      const minRaw = minInput.value.trim();
      const maxRaw = maxInput.value.trim();
      const min = minRaw === '' ? '' : this._toNumber(minRaw);
      const max = maxRaw === '' ? '' : this._toNumber(maxRaw);
      const perStore = this._computeMedianTeo(cislo);

      let rozdeleno = 0;
      this.stores.forEach((s) => {
        const vals = perStore[s.code] || {};
        const median = vals.median || 0;
        const stav = (vals.teo || 0) + (vals.dodano || 0);
        const prideli = this._clampPrideli(rw, median, stav, min, max);
        const prideliEl = el.querySelector('.rzr-prideli[data-cislo="' + CSS.escape(cislo) + '"][data-store="' + CSS.escape(s.code) + '"]');
        if (prideliEl) prideliEl.textContent = prideli;
        const upravaInput = el.querySelector('.rzr-data-row input[data-cislo="' + CSS.escape(cislo) + '"][data-store="' + CSS.escape(s.code) + '"]');
        const upravaRaw = upravaInput ? upravaInput.value.trim() : '';
        rozdeleno += upravaRaw !== '' ? (this._toNumber(upravaRaw) || 0) : prideli;
      });

      const sumEl = el.querySelector('.rzr-rozdeleno[data-cislo="' + CSS.escape(cislo) + '"]');
      if (sumEl) sumEl.textContent = rozdeleno;
    },

    saveRozdeleniMinMax(cislo) {
      const el = this.container.querySelector('#rzTabContent');
      const minRaw = el.querySelector('.rzr-minmax[data-cislo="' + CSS.escape(cislo) + '"][data-field="min"]').value.trim();
      const maxRaw = el.querySelector('.rzr-minmax[data-cislo="' + CSS.escape(cislo) + '"][data-field="max"]').value.trim();
      const min = minRaw === '' ? '' : this._toNumber(minRaw);
      const max = maxRaw === '' ? '' : this._toNumber(maxRaw);
      this._upsertRozdeleniLocal(cislo, '', { min: min, max: max });
      this._enqueue('Ukládám min/max', () => Ui.call('apiRzSaveRozdeleniMinMax', { cislo_artiklu: cislo, min: min, max: max }, { silent: true }))
        .then(() => this.loadRozdeleni())
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /** Ruční úprava RW - přepíše doposud uloženou/dopočítanou hodnotu, přepočítá se z ní příděl na všech prodejnách i celkem rozděleno. */
    saveRozdeleniRw(cislo) {
      const el = this.container.querySelector('#rzTabContent');
      // type="number" vrací vždy tečkový formát, na rozdíl od ostatních (českých, čárkových) polí - proto tu není _toNumber.
      const raw = el.querySelector('.rzr-rw[data-cislo="' + CSS.escape(cislo) + '"]').value.trim();
      const rw = raw === '' ? '' : Number(raw);
      this._upsertRozdeleniLocal(cislo, '', { rw: rw });
      this._enqueue('Ukládám RW', () => Ui.call('apiRzSaveRozdeleniRw', { cislo_artiklu: cislo, rw: rw }, { silent: true }))
        .then(() => this.loadRozdeleni())
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /**
     * Ruční přepočet RW podle aktuálního vzorce, bez ohledu na to, jestli už
     * nějaká hodnota je uložená - jinak by RW zůstalo napořád "zamrzlé" na
     * staré hodnotě dopočítané ještě podle dřívější (třeba později opravené)
     * verze vzorce, i po opravě samotného výpočtu.
     */
    recomputeRw(cislo) {
      const a = this.artikly.find((x) => x.cislo_artiklu === cislo);
      if (!a) {
        Ui.toast('Artikl ' + cislo + ' nenalezen.', 'error');
        return;
      }
      const { byArtikl } = this._rozdeleniLookup();
      const minMax = byArtikl[cislo] || {};
      const perStore = this._computeMedianTeo(cislo);
      const target = (a.k_rozdeleni !== '' && a.k_rozdeleni != null) ? Number(a.k_rozdeleni) || 0 : 0;
      const storeData = this.stores.map((s) => ({
        median: (perStore[s.code] || {}).median || 0,
        stav: ((perStore[s.code] || {}).teo || 0) + ((perStore[s.code] || {}).dodano || 0),
      }));
      const rw = this._solveRw(target, storeData, minMax.min, minMax.max);

      // Nejdřív okamžitě promítnout do DOM (bez čekání na server) - stejné
      // "online" chování jako ruční úprava RW - a teprve pak uložit na pozadí.
      const el = this.container.querySelector('#rzTabContent');
      const rwInput = el && el.querySelector('.rzr-rw[data-cislo="' + CSS.escape(cislo) + '"]');
      if (rwInput) rwInput.value = rw;
      this._recomputeBlockLive(cislo);
      Ui.toast('RW přepočítáno na ' + this._fmtNum(rw) + '.');

      this._upsertRozdeleniLocal(cislo, '', { rw: rw });
      this._enqueue('Ukládám RW', () => Ui.call('apiRzSaveRozdeleniRw', { cislo_artiklu: cislo, rw: rw }, { silent: true }))
        .then(() => this.loadRozdeleni())
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    saveRozdeleniUprava(cislo, store) {
      const el = this.container.querySelector('#rzTabContent');
      const input = el.querySelector('.rzr-data-row input[data-cislo="' + CSS.escape(cislo) + '"][data-store="' + CSS.escape(store) + '"]');
      const raw = input.value.trim();
      const uprava = raw === '' ? '' : this._toNumber(raw);
      this._upsertRozdeleniLocal(cislo, store, { uprava: uprava });
      this._enqueue('Ukládám úpravu', () => Ui.call('apiRzSaveRozdeleniUprava', { cislo_artiklu: cislo, prodejna: store, uprava: uprava }, { silent: true }))
        .then(() => {
          this.loadRozdeleni();
          const sumEl = el.querySelector('.rzr-rozdeleno[data-cislo="' + CSS.escape(cislo) + '"]');
          if (sumEl) {
            const total = [...el.querySelectorAll('.rzr-data-row input[data-cislo="' + CSS.escape(cislo) + '"]')]
              .reduce((sum, i) => sum + (this._toNumber(i.value.trim()) || 0), 0);
            sumEl.textContent = total;
          }
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /**
     * Řádky tabulky se nevykreslují všechny najednou (u desetitisíců řádků by
     * to prohlížeč nezvládl) — jen viditelné okno + malý přesah, zbytek řeší
     * dvě "spacer" buňky nahoře/dole, které dají scrollbaru správnou celkovou
     * výšku. Hlavička má stejné klikací sloupcové menu (řazení/filtr) jako
     * hlavní appka (Filiálky, Log. centra), jen podle indexu sloupce místo
     * pevného názvu, protože sloupce se u každého souboru liší.
     */
    renderImportTab(el, key) {
      const data = this.importData[key];
      const hasData = data && data.headers && data.headers.length;
      const label = (RZ_TABS.find((t) => t.key === key) || {}).label || '';

      if (!hasData) {
        el.innerHTML =
          '<section class="panel rz-compact rz-import-table-panel">' +
          '  <div class="panel-header panel-header--compact"><div><h2>' + Ui.escape(label) + '</h2></div></div>' +
          '  <div class="panel-body"><p class="form-hint">' + (data ? 'Zatím nic nenaimportováno — použij Importovat na záložce Artikly.' : 'Načítám…') + '</p></div>' +
          '</section>';
        return;
      }

      if (!this._sfState[key]) this._sfState[key] = { sorts: [], filters: {} };

      const colWidths = this._getColWidths(key);

      el.innerHTML =
        '<section class="panel rz-compact rz-import-table-panel">' +
        '  <div class="panel-header panel-header--compact"><div><h2>' + Ui.escape(label) + ' <small class="rz-row-count"></small></h2></div>' +
        (this.canWrite ? '<button class="button button-secondary button-small" type="button" id="rzSaveImportBtn"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#i-check"></use></svg>Uložit úpravy</button>' : '') +
        '  </div>' +
        '  <div class="table-wrap"><table>' +
        '<colgroup>' + colWidths.map((w) => '<col style="width:' + w + 'px">').join('') + '</colgroup>' +
        '<thead><tr>' +
        data.headers.map((h, ci) => '<th' + (this._isCenterCol(h) ? ' class="is-center"' : '') + '><button class="th-btn" type="button" data-col="' + ci + '">' + Ui.escape(h) +
          '<span class="sort-ind" data-sort-ind="' + key + '-' + ci + '"></span></button></th>').join('') +
        '</tr></thead><tbody></tbody></table></div>' +
        '</section>';

      const wrap = el.querySelector('.table-wrap');
      const tbody = el.querySelector('tbody');

      this._renderVirtualRows(key);
      this.updateSortIndicators(key);

      let scheduled = false;
      wrap.addEventListener('scroll', () => {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(() => { scheduled = false; this._renderVirtualRows(key); });
      });

      el.querySelectorAll('.th-btn').forEach((btn) => {
        btn.addEventListener('click', () => this.openColMenu(btn, key, Number(btn.dataset.col)));
      });

      if (this.canWrite) {
        // Delegovaný listener na tbody — inputy se při scrollu neustále mažou
        // a znovu vytvářejí, jednotlivé posluchače by se musely pořád
        // odpojovat/připojovat. blur nebublá, proto capture fáze.
        tbody.addEventListener('blur', (e) => {
          const input = e.target;
          if (!input || input.tagName !== 'INPUT') return;
          const vi = Number(input.dataset.vi);
          const ci = Number(input.dataset.ci);
          const view = this._getView(key);
          if (view[vi]) view[vi][ci] = input.value;
        }, true);

        const saveBtn = el.querySelector('#rzSaveImportBtn');
        if (saveBtn) saveBtn.addEventListener('click', () => this.saveImportTable(key));
      }
    },

    /** Vykreslí jen řádky viditelné v aktuálním výřezu .table-wrap (+ přesah), zbytek nahradí prázdnými "spacer" buňkami. */
    _renderVirtualRows(key) {
      const data = this.importData[key];
      const el = this.container.querySelector('#rzTabContent');
      const wrap = el && el.querySelector('.table-wrap');
      const tbody = el && el.querySelector('tbody');
      if (!data || !wrap || !tbody) return;

      const view = this._getView(key);
      const total = view.length;
      const colCount = data.headers.length;
      const dis = this.canWrite ? '' : ' disabled';

      const countEl = el.querySelector('.rz-row-count');
      if (countEl) countEl.textContent = '(' + total + (total !== data.rows.length ? ' z ' + data.rows.length : '') + ' řádků)';

      if (!total) {
        tbody.innerHTML = '<tr><td colspan="' + colCount + '">Žádné řádky neodpovídají filtru.</td></tr>';
        return;
      }

      const viewportH = wrap.clientHeight || 400;
      const overscan = 10;
      const start = Math.max(0, Math.floor(wrap.scrollTop / RZ_ROW_H) - overscan);
      const visibleCount = Math.ceil(viewportH / RZ_ROW_H) + overscan * 2;
      const end = Math.min(total, start + visibleCount);

      const centerCols = data.headers.map((h) => this._isCenterCol(h));

      let html = '';
      if (start > 0) html += '<tr><td colspan="' + colCount + '" style="height:' + (start * RZ_ROW_H) + 'px;padding:0;border:0;"></td></tr>';
      for (let i = start; i < end; i++) {
        const row = view[i];
        html += '<tr>' + row.map((cell, ci) => '<td' + (centerCols[ci] ? ' class="is-center"' : '') + '><input data-vi="' + i + '" data-ci="' + ci + '" value="' + Ui.escape(this._fixDecimal(cell)) + '"' + dis + '></td>').join('') + '</tr>';
      }
      if (end < total) html += '<tr><td colspan="' + colCount + '" style="height:' + ((total - end) * RZ_ROW_H) + 'px;padding:0;border:0;"></td></tr>';
      tbody.innerHTML = html;
    },

    /** Zdrojová data občas obsahují desetinné číslo bez úvodní nuly (",83" místo "0,83") - jen kosmetická oprava zobrazení/uložení, hodnota se tím nemění. */
    _fixDecimal(v) {
      const s = String(v);
      return /^-?,\d/.test(s) ? s.replace(/^(-?),/, '$10,') : s;
    },

    /** Sloupce, jejichž obsah zůstává zarovnaný vlevo (delší text) - všechny ostatní se centrují. Zdrojové soubory občas mají hlavičky bez diakritiky (NAZEV místo NÁZEV), proto se porovnává bez ní. */
    _isCenterCol(header) {
      const norm = String(header).trim().toLowerCase().normalize('NFD').replace(/[^\x00-\x7F]/g, '');
      return ['nazev', 'uwg nazev', 'komentar'].indexOf(norm) === -1;
    },

    /**
     * Nejmenší šířka sloupce, při které se jeho název v hlavičce zalomí
     * maximálně na dva řádky. Neodhaduje se "od oka" (padding tlačítka +
     * ikonka + mezery mezi flex položkami) - to se snadno netrefí o pár px a
     * pak se hlavička zalomí na tři řádky - ale měří se na skryté kopii
     * PŘESNĚ stejné struktury (.rz-import-table-panel table > th > .th-btn),
     * takže dostane úplně stejné CSS pravidla jako skutečná hlavička.
     */
    _measureHeaderWidthFor2Lines(text) {
      if (!this._measureRig) {
        const wrap = document.createElement('div');
        wrap.className = 'panel rz-compact rz-import-table-panel';
        wrap.style.cssText = 'position:absolute;visibility:hidden;left:-9999px;top:-9999px;';
        wrap.innerHTML =
          '<table><colgroup><col></colgroup><thead><tr><th>' +
          '<button class="th-btn" type="button"><span class="rz-measure-text"></span><span class="sort-ind"></span></button>' +
          '</th></tr></thead></table>';
        document.body.appendChild(wrap);
        this._measureRig = { col: wrap.querySelector('col'), textEl: wrap.querySelector('.rz-measure-text') };
      }
      const { col, textEl } = this._measureRig;
      textEl.textContent = text;

      const countLines = (w) => {
        col.style.width = w + 'px';
        const range = document.createRange();
        range.selectNodeContents(textEl);
        return range.getClientRects().length;
      };

      let hi = 260;
      while (countLines(hi) > 2 && hi < 600) hi += 80;
      let lo = 16;
      while (lo < hi) {
        const mid = Math.floor((lo + hi) / 2);
        if (countLines(mid) <= 2) hi = mid; else lo = mid + 1;
      }
      return hi;
    },

    /** Šířka sloupce = větší z (nejdelší hodnota DAT, minimální šířka pro dvouřádkovou hlavičku) - počítá se jednou při načtení dat, ne při každém překreslení, jinak by se u virtuálního scrollu sloupce "cukaly" podle toho, jaké řádky zrovna projíždí. */
    _getColWidths(key) {
      if (this._colWidths[key]) return this._colWidths[key];
      const data = this.importData[key];
      const widths = data.headers.map((h, ci) => {
        let maxLen = 3;
        for (let i = 0; i < data.rows.length; i++) {
          const len = this._fixDecimal(data.rows[i][ci]).length;
          if (len > maxLen) maxLen = len;
        }
        const dataWidth = Math.min(240, Math.max(56, maxLen * 7 + 24));
        const headerWidth = this._measureHeaderWidthFor2Lines(h);
        return Math.max(dataWidth, headerWidth);
      });
      this._colWidths[key] = widths;
      return widths;
    },

    /** Filtrovaná + seřazená data (podle _sfState[key]) — spočtou se jednou a cachují, ne při každém scrollu. Vrací stále stejné řádkové reference jako importData, takže úprava buňky se rovnou promítne i tam. */
    _getView(key) {
      if (this._sfViewCache[key]) return this._sfViewCache[key];
      const data = this.importData[key];
      const st = this._sfState[key] || { sorts: [], filters: {} };
      let rows = data.rows;
      if (st.filters) {
        Object.keys(st.filters).forEach((ciStr) => {
          const vals = st.filters[ciStr];
          if (vals && vals.size > 0) {
            const ci = Number(ciStr);
            rows = rows.filter((r) => vals.has(String(r[ci] ?? '')));
          }
        });
      }
      if (st.sorts && st.sorts.length) {
        rows = rows.slice().sort((a, b) => {
          for (const s of st.sorts) {
            const cmp = this._compareVals(String(a[s.col] ?? ''), String(b[s.col] ?? ''));
            if (cmp !== 0) return s.dir === 'desc' ? -cmp : cmp;
          }
          return 0;
        });
      }
      this._sfViewCache[key] = rows;
      return rows;
    },

    _invalidateView(key) {
      delete this._sfViewCache[key];
    },

    /** Rozpozná dd.mm.rrrr [hh:mm[:ss]] i samotný čas H:mm[:ss] (např. "19:02" ve sloupci Poslední prodej) a vrátí porovnatelnou hodnotu, jinak null — bez tohoto by se data řadila jako text (např. 01.2027 před 12.2026, nebo "19:02" před "9:02"). */
    _parseDate(str) {
      const s = String(str).trim();
      const m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
      if (m) {
        return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]), Number(m[4] || 0), Number(m[5] || 0), Number(m[6] || 0)).getTime();
      }
      const t = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
      if (t) {
        return (Number(t[1]) * 3600 + Number(t[2]) * 60 + Number(t[3] || 0)) * 1000;
      }
      return null;
    },

    /** Číslo i s českou desetinnou čárkou (např. "249,5" nebo ",83"), jinak NaN. */
    _toNumber(str) {
      const s = this._fixDecimal(String(str).trim());
      if (!/^-?\d+(,\d+)?$/.test(s)) return NaN;
      return Number(s.replace(',', '.'));
    },

    /** Datum → chronologicky, číslo (i s desetinnou čárkou) → číselně, jinak abecedně (cs). */
    _compareVals(av, bv) {
      const da = this._parseDate(av), db = this._parseDate(bv);
      if (da !== null && db !== null) return da - db;
      const na = this._toNumber(av), nb = this._toNumber(bv);
      if (av.trim() !== '' && bv.trim() !== '' && !isNaN(na) && !isNaN(nb)) return na - nb;
      return av.localeCompare(bv, 'cs');
    },

    /** Podle vzorku hodnot sloupce určí typ dat, aby menu nabídlo odpovídající řazení (datum/číslo/text). */
    _detectColType(key, colIndex) {
      const data = this.importData[key];
      let dateCount = 0, numCount = 0, total = 0;
      for (let i = 0; i < data.rows.length && total < 50; i++) {
        const raw = String(data.rows[i][colIndex] ?? '').trim();
        if (!raw) continue;
        total++;
        if (this._parseDate(raw) !== null) dateCount++;
        else if (!isNaN(this._toNumber(raw))) numCount++;
      }
      if (!total) return 'text';
      if (dateCount / total > 0.7) return 'date';
      if (numCount / total > 0.7) return 'number';
      return 'text';
    },

    updateSortIndicators(key) {
      const st = this._sfState[key] || {};
      const sorts = st.sorts || [];
      const filters = st.filters || {};
      this.container.querySelectorAll('[data-sort-ind^="' + key + '-"]').forEach((indEl) => {
        const ci = Number(indEl.dataset.sortInd.slice(key.length + 1));
        const sortIdx = sorts.findIndex((s) => s.col === ci);
        const hasFilter = filters[ci] && filters[ci].size > 0;
        const btn = indEl.closest('.th-btn');
        if (btn) {
          btn.classList.toggle('is-sorted', sortIdx >= 0);
          btn.classList.toggle('is-filtered', hasFilter);
        }
        if (sortIdx >= 0) {
          const arrow = sorts[sortIdx].dir === 'desc' ? '▼' : '▲';
          indEl.textContent = sorts.length > 1 ? ' ' + (sortIdx + 1) + arrow : ' ' + arrow;
        } else {
          indEl.textContent = hasFilter ? ' ⬤' : '';
        }
      });
    },

    /** Stejné sloupcové menu (řazení + filtr hodnot) jako v hlavní appce, jen podle indexu sloupce místo pevného klíče. */
    openColMenu(thEl, key, colIndex) {
      this.closeColMenu();
      if (!this._sfState[key]) this._sfState[key] = { sorts: [], filters: {} };
      const st = this._sfState[key];
      const data = this.importData[key];
      const colLabel = data.headers[colIndex];
      const allRows = data.rows;
      const activeFilters = st.filters[colIndex] || null;
      const sortIdx = st.sorts.findIndex((s) => s.col === colIndex);
      const curDir = sortIdx >= 0 ? st.sorts[sortIdx].dir : null;
      const uniqueVals = [...new Set(allRows.map((r) => String(r[colIndex] ?? '')))].sort((a, b) => this._compareVals(a, b));
      const LIMIT = 500;
      const colType = this._detectColType(key, colIndex);
      const sortLabels = colType === 'date' ? ['Od nejstaršího', 'Od nejnovějšího']
        : colType === 'number' ? ['Od nejmenšího', 'Od největšího']
        : ['A → Z', 'Z → A'];

      const menu = document.createElement('div');
      menu.className = 'col-menu';
      menu.innerHTML =
        '<div class="col-menu-head">' +
        '  <span>Sloupec: <strong>' + Ui.escape(colLabel) + '</strong></span>' +
        '  <span style="display:flex;align-items:center;gap:8px">' +
        (st.filters[colIndex] ? '<button class="col-menu-clear-filter" type="button" title="Vymazat filtr tohoto sloupce">⊟ filtr ×</button>' : '') +
        '    <button class="col-menu-close" type="button" title="Zavřít"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' +
        '  </span>' +
        '</div>' +
        '<div class="col-menu-sort-row">' +
        '  <button class="col-menu-sort-btn' + (curDir === 'asc' ? ' is-active' : '') + '" type="button" data-action="sort-primary" data-dir="asc"><span class="csb-arrow">↑</span><span class="csb-label">' + sortLabels[0] + '</span></button>' +
        '  <button class="col-menu-sort-btn' + (curDir === 'desc' ? ' is-active' : '') + '" type="button" data-action="sort-primary" data-dir="desc"><span class="csb-arrow">↓</span><span class="csb-label">' + sortLabels[1] + '</span></button>' +
        '</div>' +
        '<div class="col-menu-sort-extras">' +
        (sortIdx >= 0 ? '<button class="col-menu-sort-clear" type="button" data-action="sort-clear">✕ Zrušit řazení tohoto sloupce</button>' : '') +
        (st.sorts.length > 1 ? '<button class="col-menu-sort-clear" type="button" data-action="sort-clear-all">✕ Zrušit veškeré řazení</button>' : '') +
        '</div>' +
        '<div class="col-menu-divider"></div>' +
        '<div class="col-menu-filter-head">' +
        '  <span class="col-menu-filter-label">Filtr hodnot' + (uniqueVals.length > LIMIT ? ' (prvních ' + LIMIT + ' z ' + uniqueVals.length + ')' : '') + '</span>' +
        '  <span><button type="button" class="col-menu-sel-all">Vše</button><button type="button" class="col-menu-sel-none">Nic</button></span>' +
        '</div>' +
        '<div class="col-menu-search"><input type="text" class="col-menu-search-input" placeholder="Hledat…" autocomplete="off"></div>' +
        '<div class="col-menu-filters">' +
        uniqueVals.slice(0, LIMIT).map((v) =>
          '<label class="col-menu-item"><input type="checkbox" value="' + Ui.escape(v) + '"' + (!activeFilters || activeFilters.has(v) ? ' checked' : '') + '>' + Ui.escape(this._fixDecimal(v) || '(prázdné)') + '</label>'
        ).join('') +
        '</div>' +
        '<div class="col-menu-actions"><button class="col-menu-apply button button-primary button-small" type="button">Použít</button></div>';

      menu.style.visibility = 'hidden';
      document.body.appendChild(menu);

      // Poloha se počítá až po vložení do DOM (potřebujeme skutečnou šířku/výšku
      // menu), a je omezená na viditelnou oblast - jinak by u sloupců u pravého
      // okraje tabulky menu vyjelo mimo okno.
      const rect = thEl.getBoundingClientRect();
      const mw = menu.offsetWidth;
      const mh = menu.offsetHeight;
      let left = rect.left;
      if (left + mw > window.innerWidth - 8) left = window.innerWidth - mw - 8;
      if (left < 8) left = 8;
      let top = rect.bottom + 4;
      if (top + mh > window.innerHeight - 8) {
        top = rect.top - mh - 4;
        if (top < 8) top = 8;
      }
      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
      menu.style.visibility = '';

      const applyChange = () => {
        this._invalidateView(key);
        this._renderVirtualRows(key);
        this.updateSortIndicators(key);
      };

      menu.querySelectorAll('[data-action^="sort"]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          const dir = btn.dataset.dir;
          if (action === 'sort-primary') {
            st.sorts = st.sorts.filter((s) => s.col !== colIndex);
            st.sorts.unshift({ col: colIndex, dir });
          } else if (action === 'sort-clear') {
            st.sorts = st.sorts.filter((s) => s.col !== colIndex);
          } else if (action === 'sort-clear-all') {
            st.sorts = [];
          }
          this.closeColMenu();
          applyChange();
        });
      });

      menu.querySelector('.col-menu-search-input').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        menu.querySelectorAll('.col-menu-item').forEach((item) => {
          item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });
      menu.querySelector('.col-menu-sel-all').addEventListener('click', () => {
        menu.querySelectorAll('.col-menu-item:not([style*="none"]) input').forEach((i) => { i.checked = true; });
      });
      menu.querySelector('.col-menu-sel-none').addEventListener('click', () => {
        menu.querySelectorAll('.col-menu-item:not([style*="none"]) input').forEach((i) => { i.checked = false; });
      });

      menu.querySelector('.col-menu-apply').addEventListener('click', () => {
        const checked = [...menu.querySelectorAll('.col-menu-filters input:checked')].map((i) => i.value);
        st.filters[colIndex] = checked.length === uniqueVals.length ? null : new Set(checked);
        this.closeColMenu();
        applyChange();
      });

      menu.querySelector('.col-menu-close').addEventListener('click', () => this.closeColMenu());
      const clearFilterBtn = menu.querySelector('.col-menu-clear-filter');
      if (clearFilterBtn) {
        clearFilterBtn.addEventListener('click', () => {
          st.filters[colIndex] = null;
          this.closeColMenu();
          applyChange();
        });
      }

      this._sfMenu = { el: menu };
      setTimeout(() => {
        document.addEventListener('click', this._colMenuOutside = (e) => {
          if (!menu.contains(e.target)) this.closeColMenu();
        });
      }, 0);
    },

    closeColMenu() {
      if (this._sfMenu) {
        this._sfMenu.el.remove();
        this._sfMenu = null;
        if (this._colMenuOutside) {
          document.removeEventListener('click', this._colMenuOutside);
          this._colMenuOutside = null;
        }
      }
    },

    loadImportTable(key) {
      return Ui.call('apiRzGetImportTable', key, { silent: true })
        .then((data) => {
          this.importData[key] = data;
          this._invalidateView(key);
          delete this._colWidths[key];
          if (this.activeTab === key) this.renderTabContent();
          // Rozdělení počítá MEDIAN/Teo. stav z Odprodeje a Teo. stavů - jakmile dotečou, přepočítá se.
          if (this.activeTab === 'rozdeleni' && (key === 'odprodej' || key === 'teo_stavy')) this.renderTabContent();
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    /** Ukládá přímo z paměti (data.rows se průběžně aktualizuje při editaci buněk) — žádné procházení DOM, takže je to rychlé i u desetitisíců řádků. */
    saveImportTable(key) {
      const data = this.importData[key];
      if (!data) return;
      Ui.call('apiRzSaveImportTable', { fileKey: key, headers: data.headers, rows: data.rows }, { silent: true, busy: 'Ukládám…' })
        .then(() => Ui.toast('Uloženo.'))
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    openSettings() {
      Ui.call('apiRzGetSettings', null, { silent: true, busy: 'Načítám nastavení…' })
        .then((s) => {
          this.settings = s || {};
          const f = this.container.querySelector('#rzSettingsForm');
          f.elements.syncFolderUrl.value = this.settings.syncFolderUrl || '';
          f.elements.patternOdprodej.value = this.settings.patternOdprodej || '';
          f.elements.patternTeoStavy.value = this.settings.patternTeoStavy || '';
          f.elements.patternVyskladnovaciListy.value = this.settings.patternVyskladnovaciListy || '';
          f.elements.patternPrideleniPoArtiklech.value = this.settings.patternPrideleniPoArtiklech || '';
          f.elements.folderInformaceOArtiklech.value = this.settings.folderInformaceOArtiklech || '';
          f.elements.patternInformaceOArtiklech.value = this.settings.patternInformaceOArtiklech || '';
          Ui.openModal(this.container.querySelector('#rzSettingsModal'));
        })
        .catch((e) => Ui.toast(e.message, 'error'));
    },

    saveSettings(form) {
      const payload = {
        syncFolderUrl: form.elements.syncFolderUrl.value.trim(),
        patternOdprodej: form.elements.patternOdprodej.value.trim(),
        patternTeoStavy: form.elements.patternTeoStavy.value.trim(),
        patternVyskladnovaciListy: form.elements.patternVyskladnovaciListy.value.trim(),
        patternPrideleniPoArtiklech: form.elements.patternPrideleniPoArtiklech.value.trim(),
        folderInformaceOArtiklech: form.elements.folderInformaceOArtiklech.value.trim(),
        patternInformaceOArtiklech: form.elements.patternInformaceOArtiklech.value.trim(),
      };
      Ui.closeModal(this.container.querySelector('#rzSettingsModal'));
      Ui.call('apiRzSaveSettings', payload, { silent: true, busy: 'Ukládám nastavení…' })
        .then((s) => { this.settings = s; Ui.toast('Nastavení uloženo.'); return this.loadImportOverview(); })
        .catch((e) => Ui.toast(e.message, 'error'));
    },
  };

  SUBAPP_VIEWS['rozdelovnik-20-artiklu'] = (container, app, user) => RZ.init(container, app, user);
})();
</script>
